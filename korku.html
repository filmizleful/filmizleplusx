<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korku Filmleri</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: white;
}

/* üst menü */
.ustbar {
    background: #111;
    padding: 18px 30px;
    display: flex;
    justify-content: flex-end;
    gap: 15px;
}

.ustbar a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* başlık */
.baslik {
    text-align: center;
    font-size: 48px;
    margin-top: 70px;
    margin-bottom: 40px;
}

/* ORTALI 3 FİLM */
.film-alani {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 20px;
}

/* kart */
.film-kart {
    width: 220px;
    background: #151515;
    border-radius: 15px;
    padding: 25px 15px;
    text-align: center;
    transition: all 0.3s ease;
}

/* ikon */
.film-ikon {
    font-size: 65px;
    margin-bottom: 10px;
    transition: 0.3s;
}

/* buton */
.film-kart a {
    display: inline-block;
    margin-top: 15px;
    background: #ff7a59;
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 10px;
    transition: 0.3s;
}

/* 👻 KIRMIZI IŞIK EFEKT */
.film-kart:hover {
    transform: scale(1.08);
    background: #1a0000;
    box-shadow:
        0 0 15px red,
        0 0 30px red,
        0 0 60px rgba(255,0,0,0.6);
}

/* ikon büyür */
.film-kart:hover .film-ikon {
    transform: scale(1.3);
}

/* buton parlar */
.film-kart:hover a {
    background: red;
}
</style>

</head>
<body>
