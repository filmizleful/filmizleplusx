<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Özel Oda - Filmizleful</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1020, #1b1f3a);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .box {
      max-width: 800px;
      margin: 40px auto;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
    }

    h1 {
      color: #ffd89b;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      margin: 10px 0;
    }

    a, button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      background: #ffd89b;
      color: #2b1d0e;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Özel Oda</h1>
    <p id="roomText">Oda yükleniyor...</p>
    <a href="vip-room.html">VIP Sayfasına Dön</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get("room");

    document.getElementById("roomText").textContent =
      roomId ? "Şu an " + roomId + " odasındasın." : "Oda bilgisi bulunamadı.";
  </script>
</body>
</html>
