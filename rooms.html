<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Odalar - Filmizleful</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0c0c14;
    color:white;
}
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}
h1{
    text-align:center;
    margin-bottom:10px;
}
.aciklama{
    text-align:center;
    color:#ccc;
    margin-bottom:30px;
}
.kutu{
    background:#151515;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1c1c1c;
    color:white;
    margin-bottom:10px;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#e50914;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
.oda-list{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}
.oda{
    background:#1c1c1c;
    padding:15px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}
.oda:hover{
    background:#e50914;
}
.avatarlar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}
.avatar{
    font-size:25px;
    cursor:pointer;
    padding:5px;
}
.secili{
    border:2px solid #e50914;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Online Odalar</h1>
<div class="aciklama">İsmini kaydet, oda seç veya özel oda oluştur</div>

<div class="kutu">
    <h3>İsmini Kaydet</h3>
    <input id="isimInput" placeholder="İsmini yaz">

    <div class="avatarlar">
        <span class="avatar">😀</span>
        <span class="avatar">😎</span>
        <span class="avatar">🔥</span>
        <span class="avatar">👑</span>
        <span class="avatar">🎬</span>
        <span class="avatar">🐱</span>
    </div>

    <button onclick="kaydet()">Kaydet</button>
</div>

<div class="kutu">
    <h3>Özel Oda Oluştur</h3>
    <input id="odaInput" placeholder="Oda adı yaz">
    <input id="sifreInput" placeholder="Oda şifresi (isteğe bağlı)">
    <button onclick="odaOlustur()">Oda Aç</button>
</div>

<div class="kutu">
    <h3>Hazır Odalar</h3>
    <div class="oda-list">
        <div class="oda" onclick="gir('genel')">Genel</div>
        <div class="oda" onclick="gir('korku')">Korku</div>
        <div class="oda" onclick="gir('aksiyon')">Aksiyon</div>
        <div class="oda" onclick="gir('bilim')">Bilim Kurgu</div>
        <div class="oda" onclick="gir('macera')">Macera</div>
    </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
  authDomain: "filmizleful-chat.firebaseapp.com",
  projectId: "filmizleful-chat",
  storageBucket: "filmizleful-chat.firebasestorage.app",
  messagingSenderId: "873061099685",
  appId: "1:873061099685:web:aa697ed2baadd453dc454c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let seciliAvatar = "😀";

/* AVATAR SEC */
document.querySelectorAll(".avatar").forEach(el=>{
    el.onclick = ()=>{
        document.querySelectorAll(".avatar").forEach(a=>a.classList.remove("secili"));
        el.classList.add("secili");
        seciliAvatar = el.textContent;
    };
});

/* KAYDET */
window.kaydet = function(){
    const isim = document.getElementById("isimInput").value.trim();

    if(!isim){
        alert("İsim yaz");
        return;
    }

    localStorage.setItem("filmizleful_isim", isim);
    localStorage.setItem("filmizleful_avatar", seciliAvatar);

    alert("Kaydedildi 👍");
};

/* ODAYA GİR */
window.gir = async function(oda){
    const isim = localStorage.getItem("filmizleful_isim");

    if(!isim){
        alert("Önce isim kaydet");
        return;
    }

    const odaRef = doc(db, "odalar", oda);
    const odaDoc = await getDoc(odaRef);

    if(odaDoc.exists()){
        const data = odaDoc.data();

        if(data.sifreli){
            const girilen = prompt("Oda şifreli, şifre gir:");

            if(girilen !== data.sifre){
                alert("Yanlış şifre");
                return;
            }
        }
    }

    window.location.href = "room.html?oda=" + oda;
};

/* ODA OLUŞTUR */
window.odaOlustur = async function(){
    const oda = document.getElementById("odaInput").value.trim();
    const sifre = document.getElementById("sifreInput").value.trim();

    if(!oda){
        alert("Oda adı yaz");
        return;
    }

    const odaRef = doc(db, "odalar", oda);

    if(sifre){
        await setDoc(odaRef, {
            sifre: sifre,
            sifreli: true
        }, { merge:true });
    }

    window.location.href = "room.html?oda=" + oda;
};
</script>

</body>
</html>
