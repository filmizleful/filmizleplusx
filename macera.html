<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Arial, sans-serif;

.ustbar{

    padding:18px 28px;

.menu{

.menu a:hover{

.hero{
    text-align:center;
    padding:52px 20px 16px;

.hero h1{
    font-size:64px;
    margin:0 0 12px;
}

.hero p{
    font-size:20px;
    color:#d6d6e8;
    margin-bottom:24px;
}

.arama-alani{
    display:flex;
    justify-content:center;
    padding:0 20px 20px;
}

.arama-alani input{
    width:450px;
    max-width:95%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.07);
    color:white;
    font-size:18px;
    outline:none;
}

.baslik{
    text-align:center;
    font-size:34px;
    margin:18px 0 24px;
}

.filmler{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;

    padding:0 20px 56px;

.film{
    width:220px;
    background:rgba(255,255,255,0.05);
    border-radius:22px;
    text-align:center;
    padding:20px;
    transition:0.3s;
}

.film:hover{
    transform:scale(1.05);
}

.film img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:10px;
}

.film h3{
    margin:10px 0;
}

.film-bilgi{
    color:#ccc;
    font-size:14px;
}

.film-puan{
    color:#ffd54a;
    margin:10px 0;
}

.film a{
    display:inline-block;
    background:#f3b26a;
    color:#222;
    padding:10px 20px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.sonuc-yok{
    text-align:center;
    display:none;
}

.alt{
    text-align:center;
    padding:20px;
    color:#aaa;
}

    </div>
</div>

<div class="hero">
    <h1>Macera Filmleri</h1>
    <p>Keşif, yolculuk ve heyecan dolu maceralar</p>
</div>

<div class="arama-alani">
    <input type="text" id="aramaInput" placeholder="Macera filmi ara..." onkeyup="filmleriAra()">
</div>

<div class="baslik">🎬 Macera Listesi</div>

<div class="filmler" id="filmListesiFirebase"></div>
<div class="filmler" id="filmListesi"></div>

<div class="sonuc-yok" id="sonucYok">Film bulunamadı</div>

<div class="alt">© Filmizleplusx</div>

<script src="filmler.js"></script>
<script>
function filmKartiOlustur(film){
    return `
    <div class="film arama-ogesi" data-ara="${film.ara}">
        <img src="${film.afis}" alt="${film.isim} afiş">
        <h3>${film.isim}</h3>
        <div class="film-bilgi">${film.yil}</div>
        <div class="film-puan">⭐ ${film.puan}</div>
        <a href="film-detay.html?id=${film.id}">İzle</a>
    </div>
    `;
}

function maceralariYukle(){
    let alan = document.getElementById("filmListesi");
    let liste = FILMLER.filter(f => f.tur === "macera");
    alan.innerHTML = liste.map(filmKartiOlustur).join("");
}

function filmleriAra(){
    let input = document.getElementById("aramaInput").value.toLowerCase().trim();
    let ogeler = document.querySelectorAll(".arama-ogesi");
    let sayi = 0;

    ogeler.forEach(o => {
        let metin = o.getAttribute("data-ara").toLowerCase();
        if(metin.includes(input) || input === ""){
            o.style.display = "";
            sayi++;
        }else{
            o.style.display = "none";
        }
    });

    document.getElementById("sonucYok").style.display = sayi == 0 ? "block" : "none";
}

maceralariYukle();
</script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBmSzMlnTX94BKdUuHDPiVRqwu8of1RqHw",
  authDomain: "filmizleplusx.firebaseapp.com",
  projectId: "filmizleplusx",
  storageBucket: "filmizleplusx.firebasestorage.app",
  messagingSenderId: "296091084316",
  appId: "1:296091084316:web:aba2def23f6ce2b03761d9",
  measurementId: "G-SFQ2RQQH19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function firebaseMaceralariYukle(){
    const alan = document.getElementById("filmListesiFirebase");
    if(!alan) return;

    db.collection("filmler")
    .where("tur", "==", "macera")
    .get()
    .then((snapshot) => {
        snapshot.forEach((doc) => {
            const film = doc.data();

            const card = `
            <div class="film arama-ogesi">
                <img src="${film.afis}">
                <h3>${film.isim}</h3>
                <div class="film-bilgi">${film.yil}</div>
                <div class="film-puan">⭐ ${film.puan}</div>
                <a href="film-detay.html?id=${doc.id}">İzle</a>
            </div>
            `;

            alan.innerHTML = card + alan.innerHTML;
        });
    });
}

firebaseMaceralariYukle();
</script>
