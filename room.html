<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filmizleful Oda</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0c0c14;
    color:white;
}
.ust{
    background:#111;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}
.ust-sol{
    display:flex;
    flex-direction:column;
    gap:5px;
}
.oda-yazi{
    font-weight:bold;
    font-size:20px;
}
.kullanici-yazi{
    color:#ccc;
    font-size:14px;
}
.rol-yazi{
    color:#ffd54a;
    font-size:14px;
    font-weight:bold;
}
.geri-btn{
    color:white;
    text-decoration:none;
    background:#2a2a2a;
    padding:10px 14px;
    border-radius:10px;
}
.container{
    display:flex;
    gap:20px;
    padding:20px;
    box-sizing:border-box;
}
.video-alan{
    flex:2;
}
.video{
    width:100%;
    aspect-ratio:16/9;
    border-radius:15px;
    overflow:hidden;
    background:black;
}
.video iframe{
    width:100%;
    height:100%;
    border:0;
}
.kontrol{
    margin-top:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
.kontrol input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#222;
    color:white;
    min-width:220px;
}
.kontrol button{
    padding:10px 14px;
    background:#e50914;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}
.kontrol button:hover,
.input button:hover{
    background:#ff1e2d;
}
.kontrol button:disabled{
    background:#555;
    cursor:not-allowed;
}
.sag-panel{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:16px;
}
.online-kutu,
.chat{
    background:#151515;
    border-radius:15px;
    padding:12px;
}
.online-baslik,
.chat-baslik{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}
.online-sayi{
    font-size:16px;
    color:#ffd54a;
    margin-bottom:10px;
}
.online-liste{
    background:#1a1a1a;
    border-radius:12px;
    padding:10px;
    min-height:80px;
    max-height:160px;
    overflow-y:auto;
}
.online-kisi{
    margin-bottom:8px;
    color:#ddd;
}
.admin-kisi{
    color:#ffd54a;
    font-weight:bold;
}
.chat{
    display:flex;
    flex-direction:column;
    height:420px;
}
.mesajlar{
    flex:1;
    overflow-y:auto;
    margin-bottom:10px;
    background:#1a1a1a;
    border-radius:12px;
    padding:10px;
}
.mesaj{
    margin-bottom:10px;
    line-height:1.5;
    word-break:break-word;
}
.input{
    display:flex;
    gap:5px;
}
.input input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#222;
    color:white;
}
.input button{
    background:#e50914;
    border:none;
    border-radius:10px;
    padding:10px 14px;
    color:white;
    cursor:pointer;
}
.uyari{
    margin-top:8px;
    color:#ff9a9a;
    font-size:14px;
    text-align:left;
}
.video-durum{
    margin-top:10px;
    color:#9fdcff;
    font-size:14px;
    text-align:left;
    word-break:break-all;
}
@media(max-width:900px){
    .container{
        flex-direction:column;
    }
    .chat{
        height:360px;
    }
}
</style>
</head>
<body>

<div class="ust">
    <div class="ust-sol">
        <div class="oda-yazi" id="odaAdi">📺 Oda</div>
        <div class="kullanici-yazi" id="kullaniciAdi">Kullanıcı</div>
        <div class="rol-yazi" id="rolYazi">Rol</div>
    </div>

    <a href="rooms.html" class="geri-btn">← Geri</a>
</div>

<div class="container">

    <div class="video-alan">
        <div class="video">
            <iframe id="videoFrame" allowfullscreen></iframe>
        </div>

        <div class="kontrol">
            <input id="link" placeholder="YouTube link">
            <button id="degistirBtn" onclick="videoDegistir()">Video Değiştir</button>
        </div>

        <div class="uyari" id="uyari"></div>
        <div class="video-durum" id="videoDurum">Henüz video seçilmedi.</div>
    </div>

    <div class="sag-panel">
        <div class="online-kutu">
            <div class="online-baslik">🟢 Online Kişiler</div>
            <div class="online-sayi" id="onlineSayi">0 kişi online</div>
            <div class="online-liste" id="onlineListe"></div>
        </div>

        <div class="chat">
            <div class="chat-baslik">💬 Oda Sohbeti</div>
            <div class="mesajlar" id="mesajlar"></div>

            <div class="input">
                <input id="mesajInput" placeholder="Mesaj...">
                <button onclick="gonder()">Gönder</button>
            </div>
        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    onSnapshot,
    collection,
    addDoc,
    query,
    orderBy,
    deleteDoc,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
  authDomain: "filmizleful-chat.firebaseapp.com",
  projectId: "filmizleful-chat",
  storageBucket: "filmizleful-chat.firebasestorage.app",
  messagingSenderId: "873061099685",
  appId: "1:873061099685:web:aa697ed2baadd453dc454c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const oda = new URL(window.location.href).searchParams.get("oda") || "genel";
const isim = localStorage.getItem("filmizleful_isim") || "Misafir";
const kullaniciId = "k_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
const odaRef = doc(db, "odalar", oda);
const kullaniciRef = doc(db, "rooms", oda, "users", kullaniciId);

document.getElementById("odaAdi").innerText = "📺 Oda: " + oda;
document.getElementById("kullaniciAdi").innerText = "👤 Sen: " + isim;

let adminId = "";
let adminIsim = "";
let adminMi = false;
let heartbeatTimer = null;
let cleanupTimer = null;

const ONLINE_TIMEOUT = 15000;

function youtubeIdBul(link){
    try{
        if(link.includes("youtu.be/")){
            let id = link.split("youtu.be/")[1];
            if(id.includes("?")) id = id.split("?")[0];
            return id;
        }

        if(link.includes("youtube.com/watch?v=")){
            let url = new URL(link);
            return url.searchParams.get("v") || "";
        }

        if(link.includes("youtube.com/embed/")){
            let id = link.split("embed/")[1];
            if(id.includes("?")) id = id.split("?")[0];
            return id;
        }

        return "";
    }catch{
        return "";
    }
}

function embedLinkYap(id){
    if(!id) return "";
    return "https://www.youtube.com/embed/" + id;
}

function kontrolButonlariniAyarla() {
    document.getElementById("degistirBtn").disabled = !adminMi;

    if (adminMi) {
        document.getElementById("rolYazi").textContent = "👑 Sen oda sahibisin";
    } else if (adminIsim) {
        document.getElementById("rolYazi").textContent = "👤 Oda sahibi: " + adminIsim;
    } else {
        document.getElementById("rolYazi").textContent = "👤 Admin belirleniyor...";
    }
}

async function aktifKullanicilariGetir() {
    const usersQuery = query(collection(db, "rooms", oda, "users"), orderBy("giris"));
    const snap = await getDocs(usersQuery);
    const simdi = Date.now();
    const aktifler = [];

    for (const docSnap of snap.docs) {
        const data = docSnap.data();
        const sonGorulme = data.sonGorulme || 0;

        if (simdi - sonGorulme <= ONLINE_TIMEOUT) {
            aktifler.push({
                id: docSnap.id,
                ...data
            });
        }
    }

    return aktifler;
}

async function pasifleriTemizle() {
    const usersQuery = query(collection(db, "rooms", oda, "users"), orderBy("giris"));
    const snap = await getDocs(usersQuery);
    const simdi = Date.now();

    for (const docSnap of snap.docs) {
        const data = docSnap.data();
        const sonGorulme = data.sonGorulme || 0;

        if (simdi - sonGorulme > ONLINE_TIMEOUT) {
            try {
                await deleteDoc(doc(db, "rooms", oda, "users", docSnap.id));
            } catch(e) {}
        }
    }
}

async function adminiBelirle() {
    await pasifleriTemizle();
    const aktifler = await aktifKullanicilariGetir();

    if (aktifler.length > 0) {
        const ilkKisi = aktifler[0];
        await setDoc(odaRef, {
            sahipId: ilkKisi.id,
            sahip: ilkKisi.isim
        }, { merge: true });
    } else {
        await setDoc(odaRef, {
            sahipId: "",
            sahip: ""
        }, { merge: true });
    }
}

async function heartbeatGonder() {
    await setDoc(kullaniciRef, {
        isim: isim,
        giris: Number(kullaniciId.split("_")[1]) || Date.now(),
        sonGorulme: Date.now()
    }, { merge: true });
}

await heartbeatGonder();

const odaSnap = await getDoc(odaRef);
if (!odaSnap.exists() || !odaSnap.data().sahipId) {
    await setDoc(odaRef, {
        sahipId: kullaniciId,
        sahip: isim
    }, { merge: true });
}

heartbeatTimer = setInterval(async () => {
    try {
        await heartbeatGonder();
    } catch(e) {}
}, 5000);

cleanupTimer = setInterval(async () => {
    try {
        await pasifleriTemizle();

        const odaDoc = await getDoc(odaRef);
        const aktifler = await aktifKullanicilariGetir();

        const mevcutAdminId = odaDoc.exists() ? (odaDoc.data().sahipId || "") : "";
        const adminAktifMi = aktifler.some(k => k.id === mevcutAdminId);

        if (!adminAktifMi && aktifler.length > 0) {
            await setDoc(odaRef, {
                sahipId: aktifler[0].id,
                sahip: aktifler[0].isim
            }, { merge: true });
        }
    } catch(e) {}
}, 6000);

onSnapshot(odaRef, (snap) => {
    if (!snap.exists()) return;

    const d = snap.data();

    adminId = d.sahipId || "";
    adminIsim = d.sahip || "";
    adminMi = adminId === kullaniciId;

    kontrolButonlariniAyarla();

    if (d.videoId) {
        document.getElementById("videoDurum").textContent = "Şu an seçili video ID: " + d.videoId;
        document.getElementById("videoFrame").src = embedLinkYap(d.videoId);
    } else {
        document.getElementById("videoDurum").textContent = "Henüz video seçilmedi.";
        document.getElementById("videoFrame").src = "";
    }
});

window.videoDegistir = async function(){
    if (!adminMi) return;

    let link = document.getElementById("link").value.trim();
    let id = youtubeIdBul(link);

    if (!id) {
        document.getElementById("uyari").textContent = "Geçerli bir YouTube linki yapıştır.";
        return;
    }

    document.getElementById("uyari").textContent = "";

    await setDoc(odaRef, {
        videoId: id
    }, { merge:true });

    document.getElementById("link").value = "";
};

/* CHAT */
const chatQuery = query(collection(db, "rooms", oda, "messages"), orderBy("tarih"));

onSnapshot(chatQuery, (snapshot) => {
    let mesajlar = document.getElementById("mesajlar");
    mesajlar.innerHTML = "";

    snapshot.forEach((docSnap) => {
        let data = docSnap.data();
        let div = document.createElement("div");
        div.className = "mesaj";
        div.innerHTML = "<b>" + data.isim + ":</b> " + data.mesaj;
        mesajlar.appendChild(div);
    });

    mesajlar.scrollTop = mesajlar.scrollHeight;
});

window.gonder = async function(){
    let input = document.getElementById("mesajInput");
    let text = input.value.trim();

    if (!text) return;

    await addDoc(collection(db, "rooms", oda, "messages"), {
        isim: isim,
        mesaj: text,
        tarih: Date.now()
    });

    input.value = "";
};

/* ONLINE KİŞİLER */
onSnapshot(collection(db, "rooms", oda, "users"), async () => {
    await pasifleriTemizle();
    const aktifler = await aktifKullanicilariGetir();

    const onlineListe = document.getElementById("onlineListe");
    const onlineSayi = document.getElementById("onlineSayi");

    onlineListe.innerHTML = "";

    aktifler.forEach((kisi) => {
        const div = document.createElement("div");
        div.className = "online-kisi" + (kisi.id === adminId ? " admin-kisi" : "");
        div.textContent = (kisi.id === adminId ? "👑 " : "👤 ") + kisi.isim;
        onlineListe.appendChild(div);
    });

    onlineSayi.textContent = aktifler.length + " kişi online";

    if (aktifler.length === 0) {
        onlineListe.innerHTML = "<div class='online-kisi'>Kimse yok</div>";
    }

    const adminAktifMi = aktifler.some(k => k.id === adminId);
    if (!adminAktifMi && aktifler.length > 0) {
        await setDoc(odaRef, {
            sahipId: aktifler[0].id,
            sahip: aktifler[0].isim
        }, { merge: true });
    }
});

window.addEventListener("beforeunload", async () => {
    try {
        clearInterval(heartbeatTimer);
        clearInterval(cleanupTimer);
        await deleteDoc(kullaniciRef);
        setTimeout(async () => {
            await adminiBelirle();
        }, 300);
    } catch (e) {}
});
</script>

</body>
</html>
