<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP - Filmizleful</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0b1020, #1b1f3a);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #ffd89b;
    }

    .top-box, .invite-box, .list-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 20px;
      backdrop-filter: blur(6px);
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #ffd89b;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      outline: none;
      margin-bottom: 12px;
      font-size: 15px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #ffd89b;
      color: #2b1d0e;
      font-weight: bold;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 8px;
    }

    button:hover {
      opacity: 0.92;
    }

    .secondary {
      background: #ffffff;
      color: #222;
    }

    .danger {
      background: #ff7b7b;
      color: white;
    }

    .room-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
    }

    .room-card p {
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .empty {
      opacity: 0.8;
      text-align: center;
      padding: 10px 0;
    }

    .info {
      margin-top: 8px;
      font-size: 14px;
      color: #ddd;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #ffd89b;
      text-decoration: none;
      font-weight: bold;
    }

    .small {
      font-size: 13px;
      color: #cfcfcf;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">← Ana Sayfaya Dön</a>

    <h1>VIP Özel Oda</h1>

    <div class="top-box">
      <p><strong>Giriş yapan kullanıcı:</strong> <span id="currentUser">@misafir</span></p>
      <p class="info">Buradan özel oda oluşturabilir, birine davet gönderebilir ve gelen davetlerle odaya girebilirsin.</p>
    </div>

    <div class="invite-box">
      <label for="inviteUser">Davet gönderilecek kullanıcı adı</label>
      <input type="text" id="inviteUser" placeholder="@kullaniciadi veya kullaniciadi" />

      <button onclick="createPrivateRoom()">Özel Oda Oluştur ve Davet Gönder</button>
    </div>

    <div class="list-box">
      <h3 style="margin-bottom:12px; color:#ffd89b;">Gelen / Aktif Davetler</h3>
      <div id="inviteList"></div>
    </div>
  </div>

  <script>
    // Kullanıcı adı alma
    const currentUsername = localStorage.getItem("username") || "misafir";
    document.getElementById("currentUser").textContent = "@" + currentUsername;

    // Kayıtları oku
    function getInvites() {
      return JSON.parse(localStorage.getItem("vipInvites")) || [];
    }

    // Kayıtları yaz
    function saveInvites(invites) {
      localStorage.setItem("vipInvites", JSON.stringify(invites));
    }

    // Oda numarası üret
    function generateRoomId() {
      return "oda_" + Date.now();
    }

    // Kullanıcı adını düzelt
    function cleanUsername(name) {
      return name.replace("@", "").trim().toLowerCase();
    }

    // Özel oda oluştur + davet gönder
    function createPrivateRoom() {
      const inviteInput = document.getElementById("inviteUser");
      const targetUserRaw = inviteInput.value.trim();

      if (!targetUserRaw) {
        alert("Önce davet göndereceğin kullanıcı adını yaz.");
        return;
      }

      const targetUser = cleanUsername(targetUserRaw);
      const senderUser = cleanUsername(currentUsername);
      const roomId = generateRoomId();

      const invites = getInvites();

      invites.push({
        id: Date.now(),
        roomId: roomId,
        from: senderUser,
        to: targetUser,
        status: "bekliyor",
        createdAt: new Date().toISOString()
      });

      saveInvites(invites);
      inviteInput.value = "";

      alert("Davet gönderildi. Oda oluşturuldu: " + roomId);
      renderInvites();
    }

    // Daveti kabul et
    function acceptInvite(inviteId) {
      const invites = getInvites();
      const invite = invites.find(x => x.id === inviteId);

      if (!invite) {
        alert("Davet bulunamadı.");
        return;
      }

      invite.status = "kabul";

      saveInvites(invites);

      // Odaya direkt geç
      window.location.href = "private-room.html?room=" + encodeURIComponent(invite.roomId);
    }

    // Daveti sil / reddet
    function deleteInvite(inviteId) {
      let invites = getInvites();
      invites = invites.filter(x => x.id !== inviteId);
      saveInvites(invites);
      renderInvites();
    }

    // Odaya gir ve kaydı temizle
    function enterRoom(inviteId) {
      const invites = getInvites();
      const invite = invites.find(x => x.id === inviteId);

      if (!invite) {
        alert("Oda bulunamadı.");
        return;
      }

      // Odaya girişten önce ilgili kaydı sil
      const updatedInvites = invites.filter(x => x.id !== inviteId);
      saveInvites(updatedInvites);

      window.location.href = "private-room.html?room=" + encodeURIComponent(invite.roomId);
    }

    // Kullanıcıya ait görünmesi gereken kayıtlar
    function renderInvites() {
      const inviteList = document.getElementById("inviteList");
      const allInvites = getInvites();
      const me = cleanUsername(currentUsername);

      // Sadece kullanıcıya ait gelen davetler + kendi oluşturduğu odalar
      const myInvites = allInvites.filter(invite => {
        const fromUser = cleanUsername(invite.from || "");
        const toUser = cleanUsername(invite.to || "");
        return toUser === me || fromUser === me;
      });

      // Boş / hatalı kayıtları temizle
      const cleaned = allInvites.filter(invite => {
        return invite && invite.id && invite.roomId && invite.from && invite.to;
      });

      if (cleaned.length !== allInvites.length) {
        saveInvites(cleaned);
      }

      if (myInvites.length === 0) {
        inviteList.innerHTML = '<div class="empty">Şu an aktif davet yok.</div>';
        return;
      }

      inviteList.innerHTML = "";

      myInvites.forEach(invite => {
        const status = invite.status || "bekliyor";
        const isReceiver = cleanUsername(invite.to) === me;
        const isSender = cleanUsername(invite.from) === me;

        const card = document.createElement("div");
        card.className = "room-card";

        let buttons = "";

        // Gelen davet ve bekliyor durumdaysa kabul et
        if (isReceiver && status === "bekliyor") {
          buttons += `<button onclick="acceptInvite(${invite.id})">Kabul Et ve Odaya Gir</button>`;
          buttons += `<button class="danger" onclick="deleteInvite(${invite.id})">Reddet</button>`;
        }

        // Kabul edilmişse iki taraf da odaya girebilir
        if (status === "kabul") {
          buttons += `<button class="secondary" onclick="enterRoom(${invite.id})">Özel Odaya Gir</button>`;
        }

        // Gönderen kişi bekleyen daveti isterse silebilir
        if (isSender && status === "bekliyor") {
          buttons += `<button class="danger" onclick="deleteInvite(${invite.id})">Daveti İptal Et</button>`;
        }

        card.innerHTML = `
          <p><strong>Oda:</strong> ${invite.roomId}</p>
          <p><strong>Gönderen:</strong> @${invite.from}</p>
          <p><strong>Alıcı:</strong> @${invite.to}</p>
          <p><strong>Durum:</strong> ${status}</p>
          <div>${buttons}</div>
        `;

        inviteList.appendChild(card);
      });
    }

    renderInvites();
  </script>
</body>
</html>
