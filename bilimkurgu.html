<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilim Kurgu - Filmizleful</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top, #1d1a33 0%, #0b0b14 55%, #000 100%);
    color:white;
}

.ustbar{
    background:rgba(10,10,16,0.95);
    padding:18px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
    font-size:28px;
    color:#8b94ff;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
}

.menu a{
    color:white;
    text-decoration:none;
    padding:8px 14px;
    border-radius:10px;
    transition:0.3s;
    font-weight:bold;
}

.menu a:hover{
    background:#1f1f2d;
}

.avatar-ust{
    width:42px;
    height:42px;
    border-radius:50%;
    background:linear-gradient(135deg,#ffcf70,#ff9b47);
    color:#222;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

.hero{
    text-align:center;
    padding:52px 20px 16px;
}

.hero h1{
    font-size:64px;
    margin:0 0 12px;
}

.hero p{
    font-size:20px;
    color:#d6d6e8;
    margin-bottom:24px;
}

.arama-alani{
    display:flex;
    justify-content:center;
    padding:0 20px 20px;
}

.arama-alani input{
    width:450px;
    max-width:95%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.07);
    color:white;
    font-size:18px;
    outline:none;
}

.baslik{
    text-align:center;
    font-size:34px;
    margin:18px 0 24px;
}

.filmler{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:22px;
    max-width:1300px;
    margin:auto;
    padding:0 20px 56px;
}

.film{
    width:220px;
    background:rgba(255,255,255,0.05);
    border-radius:22px;
    text-align:center;
    padding:20px;
    transition:0.3s;
}

.film:hover{
    transform:scale(1.05);
}

.film img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:10px;
}

.film h3{
    margin:10px 0;
}

.film-bilgi{
    color:#ccc;
    font-size:14px;
}

.film-puan{
    color:#ffd54a;
    margin:10px 0;
}

.film a{
    display:inline-block;
    background:#8b94ff;
    color:white;
    padding:10px 20px;
    border-radius:10px;
    text-decoration:none;
}

.sonuc-yok{
    text-align:center;
    display:none;
}

.alt{
    text-align:center;
    padding:20px;
    color:#aaa;
}
</style>
</head>
<body>

<div class="ustbar">
    <div class="logo">🚀 Filmizleful</div>

    <div class="menu">
        <a href="index.html">Ana Sayfa</a>
        <a href="korku.html">Korku</a>
        <a href="aksiyon.html">Aksiyon</a>
        <a href="bilimkurgu.html">Bilim Kurgu</a>
        <a href="macera.html">Macera</a>
        <a href="rooms.html">💬 Online Oda</a>
        <div class="avatar-ust">😎</div>
    </div>
</div>

<div class="hero">
    <h1>Bilim Kurgu</h1>
    <p>Uzay, gelecek ve teknoloji filmleri</p>
</div>

<div class="arama-alani">
    <input type="text" id="aramaInput" placeholder="Bilim kurgu filmi ara..." onkeyup="filmleriAra()">
</div>

<div class="baslik">🎬 Bilim Kurgu Listesi</div>

<div class="filmler" id="filmListesi"></div>

<div class="sonuc-yok" id="sonucYok">Film bulunamadı</div>

<div class="alt">© Filmizleful</div>

<script src="filmler.js"></script>
<script>
function filmKartiOlustur(film){
    return `
    <div class="film arama-ogesi" data-ara="${film.ara}">
        <img src="${film.afis}" alt="${film.isim} afiş">
        <h3>${film.isim}</h3>
        <div class="film-bilgi">${film.yil}</div>
        <div class="film-puan">⭐ ${film.puan}</div>
        <a href="film-detay.html?id=${film.id}">İzle</a>
    </div>
    `;
}

function bilimKurgulariYukle(){
    let alan = document.getElementById("filmListesi");
    let liste = FILMLER.filter(f => f.tur === "bilimkurgu");
    alan.innerHTML = liste.map(filmKartiOlustur).join("");
}

function filmleriAra(){
    let input = document.getElementById("aramaInput").value.toLowerCase();
    let ogeler = document.querySelectorAll(".arama-ogesi");
    let sayi = 0;

    ogeler.forEach(o => {
        let metin = o.getAttribute("data-ara");
        if(metin.includes(input)){
            o.style.display = "";
            sayi++;
        }else{
            o.style.display = "none";
        }
    });

    document.getElementById("sonucYok").style.display = sayi == 0 ? "block" : "none";
}

bilimKurgulariYukle();
</script>

</body>
</html>
