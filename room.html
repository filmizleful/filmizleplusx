<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filmizleful Oda</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0c0c14;
    color:white;
}

.ust{
    background:#111;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.ust-sol{
    display:flex;
    flex-direction:column;
    gap:5px;
}

.oda-yazi{
    font-weight:bold;
    font-size:20px;
}

.kullanici-yazi{
    color:#ccc;
    font-size:14px;
}

.geri-btn{
    color:white;
    text-decoration:none;
    background:#2a2a2a;
    padding:10px 14px;
    border-radius:10px;
}

.container{
    display:flex;
    gap:20px;
    padding:20px;
    box-sizing:border-box;
}

.video-alan{
    flex:2;
}

.video{
    width:100%;
    aspect-ratio:16/9;
    border-radius:15px;
    overflow:hidden;
    background:black;
}

.video iframe{
    width:100%;
    height:100%;
    border:0;
}

.kontrol{
    margin-top:10px;
    display:flex;
    gap:10px;
}

.kontrol input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#222;
    color:white;
}

.kontrol button{
    padding:10px;
    background:#e50914;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.chat{
    flex:1;
    background:#151515;
    border-radius:15px;
    padding:12px;
    display:flex;
    flex-direction:column;
    height:520px;
}

.chat-baslik{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.mesajlar{
    flex:1;
    overflow-y:auto;
    margin-bottom:10px;
    background:#1a1a1a;
    border-radius:12px;
    padding:10px;
}

.mesaj{
    margin-bottom:10px;
    line-height:1.5;
    word-break:break-word;
}

.input{
    display:flex;
    gap:5px;
}

.input input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#222;
    color:white;
}

.input button{
    background:#e50914;
    border:none;
    border-radius:10px;
    padding:10px 14px;
    color:white;
    cursor:pointer;
}

.uyari{
    margin-top:8px;
    color:#ff9a9a;
    font-size:14px;
}

@media(max-width:800px){
    .container{
        flex-direction:column;
    }

    .chat{
        height:420px;
    }
}
</style>
</head>
<body>

<div class="ust">
    <div class="ust-sol">
        <div class="oda-yazi" id="odaAdi">📺 Oda</div>
        <div class="kullanici-yazi" id="kullaniciAdi">Kullanıcı</div>
    </div>

    <a href="rooms.html" class="geri-btn">← Geri</a>
</div>

<div class="container">

    <div class="video-alan">
        <div class="video">
            <iframe id="oynatici" allowfullscreen></iframe>
        </div>

        <div class="kontrol">
            <input id="link" placeholder="YouTube link">
            <button onclick="degistir()">Değiştir</button>
        </div>

        <div class="uyari" id="uyari"></div>
    </div>

    <div class="chat">
        <div class="chat-baslik">💬 Oda Sohbeti</div>

        <div class="mesajlar" id="mesajlar"></div>

        <div class="input">
            <input id="mesajInput" placeholder="Mesaj...">
            <button onclick="gonder()">Gönder</button>
        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    onSnapshot,
    collection,
    addDoc,
    query,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
  authDomain: "filmizleful-chat.firebaseapp.com",
  projectId: "filmizleful-chat",
  storageBucket: "filmizleful-chat.firebasestorage.app",
  messagingSenderId: "873061099685",
  appId: "1:873061099685:web:aa697ed2baadd453dc454c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const oda = new URL(window.location.href).searchParams.get("oda") || "genel";
let isim = localStorage.getItem("filmizleful_isim") || "Misafir";

document.getElementById("odaAdi").innerText = "📺 Oda: " + oda;
document.getElementById("kullaniciAdi").innerText = "👤 Sen: " + isim;

/* VIDEO */
function youtubeIdBul(link){
    try{
        if(link.includes("youtu.be/")){
            let id = link.split("youtu.be/")[1];
            if(id.includes("?")) id = id.split("?")[0];
            return id;
        }

        if(link.includes("youtube.com/watch?v=")){
            let id = link.split("v=")[1];
            if(id.includes("&")) id = id.split("&")[0];
            return id;
        }

        if(link.includes("youtube.com/embed/")){
            let id = link.split("embed/")[1];
            if(id.includes("?")) id = id.split("?")[0];
            return id;
        }

        return "";
    }catch{
        return "";
    }
}

window.degistir = async function(){
    let link = document.getElementById("link").value.trim();
    let id = youtubeIdBul(link);

    if(!id){
        document.getElementById("uyari").textContent = "Geçerli bir YouTube linki yapıştır.";
        return;
    }

    document.getElementById("uyari").textContent = "";
    let embed = "https://www.youtube.com/embed/" + id;

    await setDoc(doc(db, "odalar", oda), { video: embed });
    document.getElementById("link").value = "";
}

onSnapshot(doc(db, "odalar", oda), (docSnap)=>{
    if(docSnap.exists() && docSnap.data().video){
        document.getElementById("oynatici").src = docSnap.data().video;
    }
});

/* CHAT */
const q = query(collection(db, "rooms", oda, "messages"), orderBy("tarih"));

onSnapshot(q, (snapshot)=>{
    let mesajlar = document.getElementById("mesajlar");
    mesajlar.innerHTML = "";

    snapshot.forEach(docSnap=>{
        let data = docSnap.data();
        let div = document.createElement("div");
        div.className = "mesaj";
        div.innerHTML = "<b>"+ data.isim +":</b> " + data.mesaj;
        mesajlar.appendChild(div);
    });

    mesajlar.scrollTop = mesajlar.scrollHeight;
});

window.gonder = async function(){
    let input = document.getElementById("mesajInput");
    let text = input.value.trim();

    if(!text) return;

    await addDoc(collection(db, "rooms", oda, "messages"), {
        isim: isim,
        mesaj: text,
        tarih: Date.now()
    });

    input.value = "";
}
</script>

</body>
</html>
