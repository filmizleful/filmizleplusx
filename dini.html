<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dini Filmler - Filmizleful</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.ust{
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  color:#e50914;
  font-size:22px;
  font-weight:bold;
}

a{
  text-decoration:none;
  color:white;
}

.kapsa{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.baslik{
  font-size:26px;
  margin-bottom:20px;
}

.filmler{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:20px;
}

.film{
  background:#1a1a2e;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.film:hover{
  transform:scale(1.05);
}

.film img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.film-isim{
  padding:10px;
  text-align:center;
  font-size:14px;
}
</style>
</head>

<body>

<div class="ust">
  <div class="logo">Filmizleful</div>
  <a href="index.html">Ana Sayfa</a>
</div>

<div class="kapsa">
  <div class="baslik">🕌 Dini Filmler</div>
  <div class="filmler" id="filmListe"></div>
</div>

<script src="filmler.js"></script>

<script>
const liste = document.getElementById("filmListe");

// sadece dini olanları çek
const diniler = FILMLER.filter(f => 
  f.tur.toLowerCase() === "dini"
);

// ekrana bas
diniler.forEach(film => {
  liste.innerHTML += `
    <div class="film" onclick="git('${film.id}')">
      <img src="${film.afis}">
      <div class="film-isim">${film.isim}</div>
    </div>
  `;
});

// detay sayfasına git
function git(id){
  window.location.href = "film-detay.html?id=" + id;
}
</script>

</body>
</html>
