<!DOCTYPE html>
<html lang="tr">
<head>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-D31XG2S5XR"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-D31XG2S5XR');
</script>

<!-- SEO -->
<meta name="description" id="metaAciklama" content="Film açıklaması">
<meta name="keywords" id="metaKeywords" content="film izle, fragman">
<link rel="canonical" id="canonicalLink" href="">

<meta charset="UTF-8">
<title>Film Detayı</title>

<style>
/* CSS AYNEN SENİN */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:linear-gradient(180deg,#0b1020,#111827);color:white;min-height:100vh;}
a{text-decoration:none;color:inherit;}
.ust-bar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:rgba(0,0,0,0.35);backdrop-filter:blur(10px);position:sticky;top:0;z-index:1000;border-bottom:1px solid rgba(255,255,255,0.08);}
.logo{font-size:28px;font-weight:bold;color:#e50914;}
.geri-btn{background:#e50914;color:white;border:none;border-radius:10px;padding:10px 16px;cursor:pointer;font-size:14px;font-weight:bold;}
.sayfa{max-width:1200px;margin:30px auto;padding:0 16px 40px;}
.film-kart{display:grid;grid-template-columns:320px 1fr;gap:28px;background:rgba(255,255,255,0.04);border-radius:22px;overflow:hidden;}
.sol{padding:20px;}
.film-afis{width:100%;border-radius:18px;min-height:430px;background:#1f2937;}
.sag{padding:24px;}
.film-baslik{font-size:34px;margin-bottom:14px;}
.video-alan{position:relative;width:100%;padding-top:56.25%;background:#000;border-radius:16px;overflow:hidden;}
.video-alan iframe{position:absolute;top:0;left:0;width:100%;height:100%;}
</style>

</head>
<body>

<div class="ust-bar">
  <div class="logo">Filmizleplusx</div>
  <button class="geri-btn" onclick="history.back()">← Geri Dön</button>
</div>

<div class="sayfa" id="icerik">
  <div class="bos-kutu">
    <h2>Film yükleniyor...</h2>
  </div>
</div>

<script src="filmler.js"></script>

<script>
function urlParametresiAl(parametreAdi){
  const params = new URLSearchParams(window.location.search);
  return params.get(parametreAdi);
}

function youtubeEmbedYap(url){
  if(!url) return "";
  if(url.includes("watch?v=")){
    return "https://www.youtube.com/embed/" + url.split("v=")[1];
  }
  return url;
}

function filmDetayGoster(){
  const filmId = urlParametresiAl("id");
  const film = FILMLER.find(f => String(f.id) === String(filmId));

  if(!film){
    document.getElementById("icerik").innerHTML = "<h2>Film bulunamadı</h2>";
    return;
  }

  // 🔥 SEO (DOĞRU YER)
  document.title = film.isim + " izle | Filmizleplusx";

  const metaDesc = document.getElementById("metaAciklama");
  if(metaDesc){
    metaDesc.setAttribute("content", film.ozet || film.isim);
  }

  const metaKey = document.getElementById("metaKeywords");
  if(metaKey){
    metaKey.setAttribute("content", film.isim + ", film izle, " + (film.tur || ""));
  }

  const canon = document.getElementById("canonicalLink");
  if(canon){
    canon.setAttribute("href", window.location.href);
  }

  document.getElementById("icerik").innerHTML = `
    <div class="film-kart">
      <div class="sol">
        <img class="film-afis" src="${film.afis}">
      </div>
      <div class="sag">
        <h1 class="film-baslik">${film.isim}</h1>
        <p>${film.ozet}</p>

        <div class="video-alan">
          <iframe src="${youtubeEmbedYap(film.fragman)}" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  `;
}

filmDetayGoster();
</script>

</body>
</html>
