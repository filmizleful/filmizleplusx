<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macera Filmleri - Filmizleful</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top, #1d1a33 0%, #0b0b14 55%, #000 100%);
    color:white;
}

.ustbar{
    background:rgba(10,10,16,0.95);
    padding:18px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
    font-size:28px;
    color:#f3b26a;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
}

.menu a{
    color:white;
    text-decoration:none;
    padding:8px 14px;
    border-radius:10px;
    transition:0.3s;
    font-weight:bold;
}

.menu a:hover{
    background:#1f1f2d;
}

.avatar-ust{
    width:42px;
    height:42px;
    border-radius:50%;
    background:linear-gradient(135deg,#ffcf70,#ff9b47);
    color:#222;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

.hero{
    text-align:center;
    padding:52px 20px 16px;
}

.hero h1{
    font-size:64px;
    margin:0 0 12px;
}

.hero p{
    font-size:20px;
    color:#d6d6e8;
    margin-bottom:24px;
}

.arama-alani{
    display:flex;
    justify-content:center;
    padding:0 20px 20px;
}

.arama-alani input{
    width:450px;
    max-width:95%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.07);
    color:white;
    font-size:18px;
    outline:none;
}

.baslik{
    text-align:center;
    font-size:34px;
    margin:18px 0 24px;
}

.filmler{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:22px;
    max-width:1300px;
    margin:auto;
    padding:0 20px 56px;
}

.film{
    width:220px;
    background:rgba(255,255,255,0.05);
    border-radius:22px;
    text-align:center;
    padding:20px;
    transition:0.3s;
}

.film:hover{
    transform:scale(1.05);
}

.film-ikon{
    font-size:58px;
}

.film h3{
    margin:10px 0;
}

.film-bilgi{
    color:#ccc;
    font-size:14px;
}

.film-puan{
    color:#ffd54a;
    margin:10px 0;
}

.film a{
    display:inline-block;
    background:#f3b26a;
    color:#222;
    padding:10px 20px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.sonuc-yok{
    text-align:center;
    display:none;
}

.alt{
    text-align:center;
    padding:20px;
    color:#aaa;
}
</style>
</head>
<body>

<div class="ustbar">
    <div class="logo">🗺️ Filmizleful</div>

    <div class="menu">
        <a href="index.html">Ana Sayfa</a>
        <a href="korku.html">Korku</a>
        <a href="aksiyon.html">Aksiyon</a>
        <a href="bilimkurgu.html">Bilim Kurgu</a>
        <a href="macera.html">Macera</a>
        <a href="rooms.html">💬 Online Oda</a>
        <div class="avatar-ust">😎</div>
    </div>
</div>

<div class="hero">
    <h1>Macera Filmleri</h1>
    <p>Keşif, yolculuk ve heyecan dolu maceralar</p>
</div>

<div class="arama-alani">
    <input type="text" id="aramaInput" placeholder="Macera filmi ara..." onkeyup="filmleriAra()">
</div>

<div class="baslik">🎬 Macera Listesi</div>

<div class="filmler">

<div class="film arama-ogesi" data-ara="avatar macera 2009">
<div class="film-ikon">🌍</div>
<h3>Avatar</h3>
<div class="film-bilgi">2009</div>
<div class="film-puan">⭐ 7.9</div>
<a href="avatar.html">İzle</a>
</div>

<div class="film arama-ogesi" data-ara="jungle cruise macera 2021">
<div class="film-ikon">🛶</div>
<h3>Jungle Cruise</h3>
<div class="film-bilgi">2021</div>
<div class="film-puan">⭐ 6.6</div>
<a href="jungle.html">İzle</a>
</div>

<div class="film arama-ogesi" data-ara="mad max macera aksiyon 2015">
<div class="film-ikon">🏜️</div>
<h3>Mad Max</h3>
<div class="film-bilgi">2015</div>
<div class="film-puan">⭐ 8.1</div>
<a href="madmax.html">İzle</a>
</div>

</div>

<div class="sonuc-yok" id="sonucYok">Film bulunamadı</div>

<div class="alt">© Filmizleful</div>

<script>
function filmleriAra(){
let input=document.getElementById("aramaInput").value.toLowerCase();
let ogeler=document.querySelectorAll(".arama-ogesi");
let sayi=0;

ogeler.forEach(o=>{
let metin=o.getAttribute("data-ara");
if(metin.includes(input)){
o.style.display="";
sayi++;
}else{
o.style.display="none";
}
});

document.getElementById("sonucYok").style.display=sayi==0?"block":"none";
}
</script>

</body>
</html>
