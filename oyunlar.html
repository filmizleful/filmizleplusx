<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyunlar - Filmizleplusx</title>

<style>
body{
    margin:0;
    background:#0b1020;
    font-family:Arial;
    color:white;
}

h1{
    text-align:center;
    margin:30px 0;
}

.grid{
    max-width:1100px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.kart{
    background:#111827;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    padding-bottom:15px;
}

.kart img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.kart h3{
    margin:10px 0;
}

.kart button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#ff6b81;
    color:white;
    cursor:pointer;
}

.oyun-alan{
    max-width:1100px;
    margin:40px auto;
    display:none;
}

iframe{
    width:100%;
    height:600px;
    border-radius:15px;
    border:none;
}
</style>
</head>

<body>

<h1>🎮 Oyunlar</h1>

<div class="grid">

<!-- OYUN 1 -->
<div class="kart">
<img src="resimler/dino.png">
<h3>Dino Hunter King</h3>
<button onclick="oyunAc('https://html5.gamedistribution.com/a0dc9b2fcdb442faaaed550554ee370d/')">Oyna</button>
</div>

<!-- OYUN 2 -->
<div class="kart">
<img src="resimler/football.png">
<h3>Football Legends 2026</h3>
<button onclick="oyunAc('https://html5.gamedistribution.com/13eabea86f7c4cd993a156258420e9ec/')">Oyna</button>
</div>

</div>

<div class="oyun-alan" id="oyunAlan">
<iframe id="oyunFrame"></iframe>
</div>

<script>
function oyunAc(link){
    document.getElementById("oyunFrame").src = link;
    document.getElementById("oyunAlan").style.display = "block";
    window.scrollTo({top:1000, behavior:"smooth"});
}
</script>

</body>
</html>
