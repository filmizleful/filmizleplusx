<script src="filmler.js"></script>
<script>
function filmKartiOlustur(film){
    return `
    <div class="film arama-ogesi" data-ara="${film.ara}">
        <img src="${film.afis}" alt="${film.isim} afiş">
        <h3>${film.isim}</h3>
        <div class="film-bilgi">${film.yil}</div>
        <div class="film-puan">⭐ ${film.puan}</div>
        <a href="film-detay.html?id=${film.id}">İzle</a>
    </div>
    `;
}

function korkulariYukle(){
    let alan = document.getElementById("filmListesi");
    let liste = FILMLER.filter(f => f.tur === "korku");
    alan.innerHTML = liste.map(filmKartiOlustur).join("");
}

function filmleriAra(){
    let input = document.getElementById("aramaInput").value.toLowerCase().trim();
    let ogeler = document.querySelectorAll(".arama-ogesi");
    let sayi = 0;

    ogeler.forEach(o => {
        let metin = o.getAttribute("data-ara").toLowerCase();
        if(metin.includes(input) || input === ""){
            o.style.display = "";
            sayi++;
        }else{
            o.style.display = "none";
        }
    });

    document.getElementById("sonucYok").style.display = sayi == 0 ? "block" : "none";
}

korkulariYukle();
</script>
<script>
function firebaseKorkulariYukle(){
    const alan = document.getElementById("filmListesiFirebase");
    if(!alan) return;

    db.collection("filmler")
    .where("tur", "==", "korku")
    .get()
    .then((snapshot) => {

        if(snapshot.empty) return;

        snapshot.forEach((doc) => {
            const film = doc.data();

            alan.innerHTML = `
                <div class="film">
                    <img src="${film.afis || ""}">
                    <h3>${film.isim || "Film"}</h3>
                    <div class="film-bilgi">${film.yil || ""}</div>
                    <div class="film-puan">⭐ ${film.puan || ""}</div>
                    <a href="film-detay.html?id=${film.id}">İzle</a>
                </div>
            ` + alan.innerHTML;
        });

    })
    .catch((err) => {
        console.log("Firebase hata:", err);
    });
}

firebaseKorkulariYukle();
</script>
