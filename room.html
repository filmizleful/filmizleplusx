<!DOCTYPE html>
<html lang="tr">
<head>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-D31XG2S5XR"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-D31XG2S5XR');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oda - Filmizleful</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f0f1a;
    color:white;
}

.ust{
    background:#111;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.logo{
    color:#e50914;
    font-size:22px;
    font-weight:bold;
}

.ust-sag{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.btn{
    background:#e50914;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
    font-weight:bold;
}

.sayfa{
    padding:20px;
}

.oda-bilgi{
    margin-bottom:15px;
    color:#ccc;
}

.grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
}

.sol{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.sag{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.kutu{
    background:#1a1a2b;
    border-radius:14px;
    padding:14px;
}

.baslik{
    font-size:20px;
    font-weight:bold;
    margin-bottom:12px;
}

.videoKontrol{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
}

.videoKontrol input{
    flex:1;
    min-width:220px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}

.videoAlan{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:12px;
    overflow:hidden;
}

.videoAlan iframe{
    width:100%;
    height:100%;
    border:none;
}

.chat{
    height:300px;
    overflow:auto;
    background:#12121f;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
}

.mesaj{
    margin-bottom:8px;
    padding:8px;
    background:#222;
    border-radius:8px;
    word-break:break-word;
}

.chatAlt{
    display:flex;
    gap:8px;
}

.chatAlt input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

.onlineListe{
    background:#12121f;
    border-radius:10px;
    padding:10px;
    min-height:120px;
}

.onlineKisi{
    margin-bottom:8px;
    padding:6px 8px;
    background:#222;
    border-radius:8px;
}

@media(max-width:900px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="ust">
    <div class="logo">🎬 Filmizleful Oda</div>

    <div class="ust-sag">
        <a href="rooms.html" class="btn">← Geri</a>
        <button class="btn" onclick="linkKopyala()">🔗 Link Kopyala</button>
    </div>
</div>

<div class="sayfa">
    <div class="oda-bilgi" id="odaBilgi">Oda bilgisi</div>

    <div class="grid">
        <div class="sol">

            <div class="kutu">
                <div class="baslik">🎬 Ortak Video</div>

                <div class="videoKontrol">
                    <input id="videoInput" placeholder="YouTube link yapıştır">
                    <button class="btn" onclick="videoAyarla()">Video Aç</button>
                </div>

                <div class="videoAlan">
                    <iframe id="videoFrame" allowfullscreen></iframe>
                </div>
            </div>

        </div>

        <div class="sag">

            <div class="kutu">
                <div class="baslik">🟢 Odadakiler</div>
                <div class="onlineListe" id="onlineListe"></div>
            </div>

            <div class="kutu">
                <div class="baslik">💬 Sohbet</div>
                <div class="chat" id="chat"></div>

                <div class="chatAlt">
                    <input id="mesaj" placeholder="Mesaj yaz...">
                    <button class="btn" onclick="gonder()">Gönder</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    doc,
    setDoc,
    getDoc,
    getDocs,
    deleteDoc,
    query,
    orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
  authDomain: "filmizleful-chat.firebaseapp.com",
  projectId: "filmizleful-chat"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const oda = params.get("oda") || "genel";
const isim = localStorage.getItem("filmizleful_isim") || localStorage.getItem("kullanici") || "Misafir";
const avatar = localStorage.getItem("filmizleful_avatar") || "😎";

document.getElementById("odaBilgi").textContent = "📺 Oda: " + oda + " • " + avatar + " " + isim;

const kullaniciId = "k_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
const userRef = doc(db, "rooms", oda, "users", kullaniciId);
const odaRef = doc(db, "odalar", oda);

const ONLINE_TIMEOUT = 15000;

async function sifreKontrol(){
    const odaDoc = await getDoc(odaRef);
    if(!odaDoc.exists()) return true;

    const data = odaDoc.data();
    if(!data.sifreli || !data.sifre) return true;

    const kayitAnahtari = "filmizleful_izin_" + oda;
    const oncekiIzin = sessionStorage.getItem(kayitAnahtari);
    if(oncekiIzin === "tamam") return true;

    const girilen = prompt("Bu oda şifreli. Şifreyi gir:");
    if(girilen !== data.sifre){
        alert("Şifre yanlış");
        window.location.href = "rooms.html";
        return false;
    }

    sessionStorage.setItem(kayitAnahtari, "tamam");
    return true;
}

const izin = await sifreKontrol();
if(!izin){
    throw new Error("Şifre hatalı");
}

function youtubeIdBul(link){
    try{
        if(link.includes("youtu.be/")){
            let id = link.split("youtu.be/")[1];
            if(id.includes("?")) id = id.split("?")[0];
            return id;
        }else if(link.includes("watch?v=")){
            let id = link.split("v=")[1];
            if(id.includes("&")) id = id.split("&")[0];
            return id;
        }else if(link.includes("embed/")){
            let id = link.split("embed/")[1];
            if(id.includes("?")) id = id.split("?")[0];
            return id;
        }
        return "";
    }catch{
        return "";
    }
}

window.videoAyarla = async function(){
    const link = document.getElementById("videoInput").value.trim();
    const id = youtubeIdBul(link);

    if(!id){
        alert("Geçerli YouTube linki gir");
        return;
    }

    await setDoc(odaRef, { videoId: id }, { merge:true });
    document.getElementById("videoInput").value = "";
};

onSnapshot(odaRef, (snap)=>{
    if(!snap.exists()) return;
    const data = snap.data();
    if(data.videoId){
        document.getElementById("videoFrame").src = "https://www.youtube.com/embed/" + data.videoId;
    }
});

const chatRef = collection(db, "chat_" + oda);

window.gonder = async function(){
    const mesaj = document.getElementById("mesaj").value.trim();
    if(!mesaj) return;

    await addDoc(chatRef, {
        isim: isim,
        avatar: avatar,
        mesaj: mesaj,
        tarih: Date.now()
    });

    document.getElementById("mesaj").value = "";
};

onSnapshot(chatRef, (snap)=>{
    let html = "";
    snap.forEach(docSnap=>{
        const data = docSnap.data();
        html += `<div class="mesaj"><b>${data.avatar} ${data.isim}:</b> ${data.mesaj}</div>`;
    });
    document.getElementById("chat").innerHTML = html;
    const alan = document.getElementById("chat");
    alan.scrollTop = alan.scrollHeight;
});

async function heartbeat(){
    await setDoc(userRef, {
        isim: isim,
        avatar: avatar,
        sonGorulme: Date.now(),
        giris: Date.now()
    }, { merge:true });
}

await heartbeat();

setInterval(async()=>{
    try{
        await heartbeat();
    }catch(e){}
}, 5000);

onSnapshot(collection(db, "rooms", oda, "users"), async ()=>{
    const snap = await getDocs(query(collection(db, "rooms", oda, "users"), orderBy("giris")));
    const simdi = Date.now();
    let html = "";

    for(const belge of snap.docs){
        const data = belge.data();
        const son = data.sonGorulme || 0;

        if(simdi - son > ONLINE_TIMEOUT){
            try{
                await deleteDoc(doc(db, "rooms", oda, "users", belge.id));
            }catch(e){}
            continue;
        }

        html += `<div class="onlineKisi">${data.avatar || "😎"} ${data.isim}</div>`;
    }

    document.getElementById("onlineListe").innerHTML = html || "<div class='onlineKisi'>Kimse yok</div>";
});

window.linkKopyala = function(){
    navigator.clipboard.writeText(window.location.href)
    .then(()=> alert("Link kopyalandı"))
    .catch(()=> alert("Kopyalama olmadı"));
};

window.addEventListener("beforeunload", async ()=>{
    try{
        await deleteDoc(userRef);
    }catch(e){}
});
</script>

</body>
</html>
