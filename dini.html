<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dini Filmler - Filmizleful</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top, #1d1a33 0%, #0b0b14 55%, #000 100%);
  color:white;
}

.ust{
  background:rgba(10,10,16,0.95);
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.06);
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  color:#ff6d7a;
  font-size:28px;
  font-weight:bold;
}

.ust a{
  color:white;
  text-decoration:none;
  font-weight:bold;
  padding:8px 14px;
  border-radius:10px;
}

.ust a:hover{
  background:#1f1f2d;
}

.kapsa{
  max-width:1300px;
  margin:auto;
  padding:30px 20px 50px;
}

.baslik{
  font-size:42px;
  margin-bottom:10px;
}

.alt-yazi{
  color:#d1d5db;
  font-size:18px;
  margin-bottom:30px;
}

.filmler{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:22px;
}

.film{
  width:220px;
  background:rgba(255,255,255,0.05);
  border-radius:22px;
  text-align:center;
  padding:16px 16px 24px;
  border:1px solid rgba(255,255,255,0.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.18);
  transition:0.35s;
  overflow:hidden;
}

.film:hover{
  transform:translateY(-8px) scale(1.04);
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

.film img{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:14px;
  margin-bottom:12px;
  display:block;
  background:#111;
}

.film h3{
  margin:0 0 8px;
  font-size:22px;
  min-height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.film-bilgi{
  color:#e1e1ea;
  font-size:15px;
  margin-bottom:8px;
}

.film-puan{
  color:#ffe3a8;
  font-size:15px;
  font-weight:bold;
  margin-bottom:14px;
}

.film a{
  display:inline-block;
  text-decoration:none;
  background:#7c3aed;
  color:white;
  padding:10px 22px;
  border-radius:12px;
  font-weight:bold;
  transition:0.3s;
}

.film a:hover{
  transform:scale(1.04);
  opacity:0.95;
}

.bos-mesaj{
  width:100%;
  text-align:center;
  color:#d1d5db;
  font-size:20px;
  padding:40px 20px;
  background:rgba(255,255,255,0.04);
  border-radius:20px;
}

@media(max-width:700px){
  .film{
    width:100%;
    max-width:320px;
  }

  .baslik{
    font-size:32px;
  }

  .alt-yazi{
    font-size:16px;
  }
}
</style>
</head>
<body>

<div class="ust">
  <div class="logo">🎬 Filmizleful</div>
  <a href="index.html">Ana Sayfa</a>
</div>

<div class="kapsa">
  <div class="baslik">🕌 Dini Filmler</div>
  <div class="alt-yazi">İslami ve tarihi yapımlar burada.</div>

  <div class="filmler" id="filmListesiFirebase"></div>
<div class="filmler" id="diniFilmlerAlani"></div>
</div>

<script src="filmler.js"></script>
<script>
const alan = document.getElementById("diniFilmlerAlani");

function guvenliYazi(metin){
  return String(metin || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function yedekAfis(filmAdi){
  const ad = String(filmAdi || "Film").substring(0, 28);

  return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" width="400" height="600">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#241a3a"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
      <rect width="100%" height="100%" fill="url(#g)"/>
      <text x="50%" y="42%" text-anchor="middle" fill="white" font-size="30" font-family="Arial" font-weight="bold">${ad}</text>
      <text x="50%" y="51%" text-anchor="middle" fill="#f8e7b0" font-size="22" font-family="Arial">Dini Film</text>
      <text x="50%" y="84%" text-anchor="middle" fill="white" font-size="26" font-family="Arial">Filmizleful</text>
    </svg>
  `);
}

const diniFilmler = FILMLER.filter(film => film.tur && film.tur.toLowerCase() === "dini");

if(diniFilmler.length === 0){
  alan.innerHTML = `<div class="bos-mesaj">Henüz dini film eklenmedi.</div>`;
}else{
  alan.innerHTML = diniFilmler.map(film => {
    const isim = guvenliYazi(film.isim);
    const meta = guvenliYazi(film.meta || (film.tur + " • " + film.yil));
    const puan = guvenliYazi(film.puan || "-");
    const afis = film.afis ? guvenliYazi(film.afis) : yedekAfis(film.isim);
    const fallback = yedekAfis(film.isim);

    return `
      <div class="film">
        <img src="${afis}" alt="${isim}" onerror="this.onerror=null; this.src='${fallback}'">
        <h3>${isim}</h3>
        <div class="film-bilgi">${meta}</div>
        <div class="film-puan">⭐ IMDb ${puan}</div>
        <a href="film-detay.html?id=${film.id}">İzle</a>
      </div>
    `;
  }).join("");
}
</script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBmSzMlnTX94BKdUuHDPiVRqwu8of1RqHw",
  authDomain: "filmizleplusx.firebaseapp.com",
  projectId: "filmizleplusx",
  storageBucket: "filmizleplusx.firebasestorage.app",
  messagingSenderId: "296091084316",
  appId: "1:296091084316:web:aba2def23f6ce2b03761d9",
  measurementId: "G-SFQ2RQQH19"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function firebaseDiniFilmleriYukle(){
    const alan = document.getElementById("filmListesiFirebase");

    db.collection("filmler")
    .where("tur", "==", "dini")
    .get()
    .then((snapshot) => {
        snapshot.forEach((doc) => {
            const film = doc.data();

            const card = `
            <div class="film">
                <img src="${film.afis}">
                <h3>${film.isim}</h3>
                <div class="film-bilgi">${film.yil || ""}</div>
                <div class="film-puan">⭐ ${film.puan || ""}</div>
                <a href="film-detay.html?id=${doc.id}">İzle</a>
            </div>
            `;

            alan.innerHTML = card + alan.innerHTML;
        });
    });
}

firebaseDiniFilmleriYukle();
</script>

</body>
</html>
