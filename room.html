<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Filmizleful Oda</title>

<style>
body{margin:0;font-family:Arial;background:#0c0c14;color:white;}
.ust{background:#111;padding:15px;display:flex;justify-content:space-between;}
.container{display:flex;gap:20px;padding:20px;}
.video-alan{flex:2;}
.video{width:100%;aspect-ratio:16/9;background:black;border-radius:10px;}
#player{width:100%;height:100%;}
.kontrol{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;}
.kontrol input,.kontrol button{padding:10px;border-radius:10px;border:none;}
.kontrol button{background:#e50914;color:white;cursor:pointer;}
.kontrol button:disabled{background:#555;cursor:not-allowed;}
.sag{flex:1;}
.chat{background:#151515;padding:10px;border-radius:10px;height:400px;display:flex;flex-direction:column;}
.mesajlar{flex:1;overflow:auto;}
.input{display:flex;}
.input input{flex:1;padding:10px;background:#222;color:white;border:none;}
.input button{background:#e50914;color:white;border:none;padding:10px;}
.sahip{color:#ffd54a;font-weight:bold;}
</style>
</head>

<body>

<div class="ust">
    <div id="oda"></div>
    <div id="rol"></div>
</div>

<div class="container">

<div class="video-alan">
    <div class="video"><div id="player"></div></div>

    <div class="kontrol">
        <input id="link" placeholder="YouTube link">
        <button id="degistirBtn" onclick="degistir()">Video</button>
        <button id="playBtn" onclick="play()">▶</button>
        <button id="pauseBtn" onclick="pause()">⏸</button>
    </div>
</div>

<div class="sag">
    <div class="chat">
        <div class="mesajlar" id="mesajlar"></div>
        <div class="input">
            <input id="mesajInput">
            <button onclick="gonder()">Gönder</button>
        </div>
    </div>
</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
  projectId: "filmizleful-chat"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const oda = new URL(location.href).searchParams.get("oda") || "genel";
const isim = localStorage.getItem("filmizleful_isim") || "Misafir";

document.getElementById("oda").innerText = "Oda: " + oda;

let sahipMi = false;

// oda sahibi kontrol
const odaRef = doc(db, "odalar", oda);

const odaData = await getDoc(odaRef);

if(!odaData.exists()){
    await setDoc(odaRef, { sahip: isim });
    sahipMi = true;
}else{
    if(odaData.data().sahip === isim){
        sahipMi = true;
    }
}

// UI ayarla
if(sahipMi){
    document.getElementById("rol").innerHTML = "👑 <span class='sahip'>Oda Sahibi</span>";
}else{
    document.getElementById("rol").innerText = "👤 İzleyici";
    document.getElementById("degistirBtn").disabled = true;
    document.getElementById("playBtn").disabled = true;
    document.getElementById("pauseBtn").disabled = true;
}

// YouTube
let player;

window.onYouTubeIframeAPIReady = function(){
    player = new YT.Player("player");
};

function getId(link){
    let id = link.split("v=")[1];
    if(id && id.includes("&")) id = id.split("&")[0];
    return id;
}

// video değiştir
window.degistir = async function(){
    if(!sahipMi) return;

    let id = getId(document.getElementById("link").value);

    await setDoc(odaRef,{
        video:id
    },{merge:true});
};

// play
window.play = async function(){
    if(!sahipMi) return;

    await setDoc(odaRef,{action:"play"},{merge:true});
};

// pause
window.pause = async function(){
    if(!sahipMi) return;

    await setDoc(odaRef,{action:"pause"},{merge:true});
};

// dinle
onSnapshot(odaRef,(snap)=>{
    let d = snap.data();

    if(d.video){
        player.loadVideoById(d.video);
    }

    if(d.action==="play"){
        player.playVideo();
    }

    if(d.action==="pause"){
        player.pauseVideo();
    }
});

// chat
onSnapshot(collection(db,"rooms",oda,"messages"),(snap)=>{
    let m=document.getElementById("mesajlar");
    m.innerHTML="";
    snap.forEach(doc=>{
        let d=doc.data();
        m.innerHTML+="<div><b>"+d.isim+":</b> "+d.mesaj+"</div>";
    });
});

window.gonder=async function(){
    let text=document.getElementById("mesajInput").value;
    await addDoc(collection(db,"rooms",oda,"messages"),{
        isim:isim,
        mesaj:text
    });
};
</script>

</body>
</html>
