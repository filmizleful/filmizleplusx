<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odalar - Filmizleful</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:radial-gradient(circle at top,#1b1b2f,#09090f 70%);
    color:white;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    box-sizing:border-box;
}
.kutu{
    width:100%;
    max-width:520px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:30px;
    box-sizing:border-box;
}
h1{
    margin-top:0;
    text-align:center;
}
p{
    color:#ccc;
    text-align:center;
    line-height:1.6;
}
input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:#1b1b1b;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}
button{
    width:100%;
    margin-top:16px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#e50914;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
button:hover{
    background:#ff1e2d;
}
.kucuk{
    margin-top:14px;
    font-size:14px;
    text-align:center;
}
</style>
</head>
<body>

<div class="kutu">
    <h1>🎬 Online Oda Girişi</h1>
    <p>Adını yaz, oda adını gir ve odaya katıl.</p>

    <input type="text" id="isim" placeholder="Adın">
    <input type="text" id="oda" placeholder="Oda adı (mesela korku1)">

    <button onclick="odayaGir()">Odaya Gir</button>

    <div class="kucuk" id="uyari"></div>
</div>

<script>
function odayaGir() {
    const isim = document.getElementById("isim").value.trim();
    const oda = document.getElementById("oda").value.trim();
    const uyari = document.getElementById("uyari");

    if (!isim || !oda) {
        uyari.textContent = "İsim ve oda adı boş olamaz.";
        uyari.style.color = "#ff8080";
        return;
    }

    localStorage.setItem("filmizleful_isim", isim);
    window.location.href = "room.html?oda=" + encodeURIComponent(oda);
}
</script>

</body>
</html>
