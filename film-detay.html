  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#0b1020,#111827);
      color:white;
      min-height:100vh;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .ust-bar{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 20px;
      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(10px);
      position:sticky;
      top:0;
      z-index:1000;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#e50914;
      letter-spacing:0.5px;
    }

    .geri-btn{
      background:#e50914;
      color:white;
      border:none;
      border-radius:10px;
      padding:10px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:bold;
    }

    .geri-btn:hover{
      opacity:0.9;
    }

    .sayfa{
      max-width:1200px;
      margin:30px auto;
      padding:0 16px 40px;
    }

    .film-kart{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:28px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 15px 40px rgba(0,0,0,0.35);
    }

    .sol{
      padding:20px;
      background:rgba(255,255,255,0.02);
    }

    .film-afis{
      width:100%;
      border-radius:18px;
      display:block;
      object-fit:cover;
      background:#1f2937;
      min-height:430px;
    }

    .sag{
      padding:24px;
    }

    .film-baslik{
      font-size:34px;
      margin-bottom:14px;
      line-height:1.2;
    }

    .etiketler{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:18px;
    }

    .etiket{
      background:#1f2937;
      color:#e5e7eb;
      padding:8px 14px;
      border-radius:999px;
      font-size:14px;
      border:1px solid rgba(255,255,255,0.07);
    }

    .film-ozet{
      font-size:17px;
      line-height:1.7;
      color:#d1d5db;
      margin-bottom:18px;
    }

    .film-hakkinda{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:16px;
      padding:16px;
      margin-bottom:20px;
    }

    .film-hakkinda h3{
      margin-bottom:10px;
      font-size:20px;
      color:#fff;
    }

    .film-hakkinda p{
      color:#d1d5db;
      line-height:1.7;
      margin-bottom:8px;
    }

    .oynatma-kutu,
    .yorum-kutu,
    .puan-kutu{
      background:#0b1220;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:16px;
      margin-top:18px;
    }

    .oynatma-kutu h3,
    .yorum-kutu h3,
    .puan-kutu h3{
      margin-bottom:14px;
      font-size:22px;
    }

    .video-alan{
      position:relative;
      width:100%;
      padding-top:56.25%;
      background:#000;
      border-radius:16px;
      overflow:hidden;
    }

    .video-alan iframe,
    .video-alan video{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      border:none;
    }

    .video-yok{
      background:#1f2937;
      color:#d1d5db;
      border-radius:14px;
      padding:18px;
      text-align:center;
      line-height:1.6;
    }

    .butonlar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:18px;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-kirmizi{
      background:#e50914;
      color:white;
    }

    .btn-gri{
      background:#374151;
      color:white;
    }

    .btn-yesil{
      background:#16a34a;
      color:white;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:0.95;
    }

    .uyari{
      margin-top:14px;
      color:#9ca3af;
      font-size:14px;
      line-height:1.6;
    }

    .bos-kutu{
      max-width:700px;
      margin:70px auto;
      text-align:center;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      padding:30px 20px;
      border-radius:20px;
    }

    .bos-kutu h2{
      margin-bottom:12px;
      font-size:28px;
    }

    .bos-kutu p{
      color:#d1d5db;
      line-height:1.7;
      margin-bottom:18px;
    }

    .izledim-durum{
      margin-top:14px;
      font-size:15px;
      color:#86efac;
      font-weight:bold;
    }

    .yorum-form{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .yorum-input,
    .yorum-textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:14px;
      background:#1f2937;
      color:white;
      font-size:15px;
    }

    .yorum-textarea{
      min-height:110px;
      resize:vertical;
    }

    .yorum-listesi{
      margin-top:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .yorum-item{
      background:#1f2937;
      border-radius:14px;
      padding:14px;
      border:1px solid rgba(255,255,255,0.06);
    }

    .yorum-ust{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .yorum-ad{
      font-weight:bold;
      color:#fff;
    }

    .yorum-tarih{
      font-size:13px;
      color:#9ca3af;
    }

    .yorum-metin{
      color:#d1d5db;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .yorum-yok{
      background:#1f2937;
      color:#cbd5e1;
      border-radius:14px;
      padding:16px;
      text-align:center;
    }

    .puan-ozet{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      margin-bottom:14px;
    }

    .puan-buyuk{
      font-size:30px;
      font-weight:bold;
      color:#ffe3a8;
    }

    .puan-detay{
      color:#cbd5e1;
      font-size:15px;
    }

    .yildizlar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .yildiz-btn{
      border:none;
      background:#1f2937;
      color:#ffd166;
      font-size:28px;
      width:52px;
      height:52px;
      border-radius:14px;
      cursor:pointer;
      transition:0.2s;
    }

    .yildiz-btn:hover{
      transform:translateY(-2px) scale(1.05);
      background:#2b3444;
    }

    .yildiz-btn.aktif{
      background:#3b2f12;
      box-shadow:0 0 0 1px rgba(255,209,102,0.22) inset;
    }

    .puan-bilgi{
      margin-top:12px;
      color:#9ca3af;
      font-size:14px;
      line-height:1.6;
    }

    @media (max-width: 900px){
      .film-kart{
        grid-template-columns:1fr;
      }

      .film-baslik{
        font-size:28px;
      }

      .film-afis{
        max-width:360px;
        margin:auto;
      }
    }
  </style>
</head>

  <div class="ust-bar">
    <div class="logo">Filmizleplusx</div>

  <div class="sayfa" id="icerik">
    <div class="bos-kutu">
      <h2>Film yükleniyor...</h2>

  <script src="filmler.js"></script>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      addDoc, 
      onSnapshot, 
      query, 
      orderBy,
      doc,
      setDoc,
      getDocs,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
      authDomain: "filmizleful-chat.firebaseapp.com",
      projectId: "filmizleful-chat",
      storageBucket: "filmizleful-chat.firebasestorage.app",
      messagingSenderId: "873061099685",
      appId: "1:873061099685:web:aa697ed2baadd453dc454c",
      measurementId: "G-BQ9P47BS8S"
    };

    const filmPanelConfig = {
      apiKey: "AIzaSyBmSzMlnTX94BKdUuHDPiVRqwu8of1RqHw",
      authDomain: "filmizleplusx.firebaseapp.com",
      projectId: "filmizleplusx",
      storageBucket: "filmizleplusx.firebasestorage.app",
      messagingSenderId: "296091084316",
      appId: "1:296091084316:web:aba2def23f6ce2b03761d9",
      measurementId: "G-SFQ2RQQH19"
    };

    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const panelApp = initializeApp(filmPanelConfig, "filmizleplusxPanel");
    const panelDb = getFirestore(panelApp);

    const icerik = document.getElementById("icerik");

    function urlParametresiAl(parametreAdi){
      const params = new URLSearchParams(window.location.search);
      return params.get(parametreAdi);
    }

    function youtubeEmbedYap(url){
      if(!url) return "";

      try{
        if(url.includes("youtube.com/watch?v=")){
          const urlObj = new URL(url);
          const videoId = urlObj.searchParams.get("v");
          if(videoId){
            return "https://www.youtube.com/embed/" + videoId;
          }
        }

        if(url.includes("youtu.be/")){
          const parca = url.split("youtu.be/")[1];
          if(parca){
            const videoId = parca.split("?")[0];
            return "https://www.youtube.com/embed/" + videoId;
          }
        }

        if(url.includes("youtube.com/embed/")){
          return url;
        }

        return url;
      }catch(e){
        return url;
      }
    }

    function izledimAnahtari(filmId){
      return "izledim_" + filmId;
    }

    function cihazAnahtari(){
      let id = localStorage.getItem("filmizleful_cihaz_id");
      if(!id){
        id = "cihaz_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
        localStorage.setItem("filmizleful_cihaz_id", id);
      }
      return id;
    }

    function tarihYazisiOlustur(){
      const tarih = new Date();
      const gun = String(tarih.getDate()).padStart(2, "0");
      const ay = String(tarih.getMonth() + 1).padStart(2, "0");
      const yil = tarih.getFullYear();
      const saat = String(tarih.getHours()).padStart(2, "0");
      const dakika = String(tarih.getMinutes()).padStart(2, "0");
      return gun + "." + ay + "." + yil + " " + saat + ":" + dakika;
    }

    function guvenliMetin(metin){
      return String(metin)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function yorumTarihiFormatla(deger){
      if(!deger) return "";
      if(typeof deger === "string") return deger;

      try{
        if(typeof deger.toDate === "function"){
          const t = deger.toDate();
          const gun = String(t.getDate()).padStart(2, "0");
          const ay = String(t.getMonth() + 1).padStart(2, "0");
          const yil = t.getFullYear();
          const saat = String(t.getHours()).padStart(2, "0");
          const dakika = String(t.getMinutes()).padStart(2, "0");
          return gun + "." + ay + "." + yil + " " + saat + ":" + dakika;
        }
      }catch(e){
        return "";
      }

      return "";
    }

    function videoKutusuOlustur(film){
      const fragmanLinki = film.fragman || "";
      const izleLinki = film.izle || "";

      let videoHTML = "";

      if(fragmanLinki){
        const link = youtubeEmbedYap(fragmanLinki);

        if(
          link.includes("youtube.com/embed/") ||
          link.includes("youtube.com/watch?v=") ||
          link.includes("youtu.be/")
        ){
          videoHTML = `
            <div class="video-alan">
              <iframe
                src="${youtubeEmbedYap(fragmanLinki)}"
                title="${film.isim} Fragman"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
              </iframe>
            </div>
          `;
        }else if(
          link.endsWith(".mp4") ||
          link.endsWith(".webm") ||
          link.endsWith(".ogg")
        ){
          videoHTML = `
            <div class="video-alan">
              <video controls controlsList="nodownload">
                <source src="${link}">
                Tarayıcınız video etiketini desteklemiyor.
              </video>
            </div>
          `;
        }else{
          videoHTML = `
            <div class="video-yok">
              Fragman bağlantısı var ama uygun formatta değil.
            </div>
          `;
        }
      }else{
        videoHTML = `
          <div class="video-yok">
            Bu film için henüz fragman eklenmemiş.
          </div>
        `;
      }

      let izleButonu = "";
      if(izleLinki && izleLinki !== "#"){
        izleButonu = `<a class="btn btn-kirmizi" href="${izleLinki}" target="_blank">Filmi Aç</a>`;
      }

      return `
        <div class="oynatma-kutu">
          <h3>Fragman / Video</h3>

          <p style="font-size:13px;color:#aaa;margin-bottom:10px;">
            Bu içerik YouTube üzerinden sağlanmaktadır.
          </p>

          ${videoHTML}

          <a class="btn btn-kirmizi" href="${film.fragman || "#"}" target="_blank">
            YouTube'da Aç
          </a>

          <div class="butonlar">
            ${izleButonu}
            <button class="btn btn-yesil" id="izledimBtn">✅ İzledim</button>
            <button class="btn btn-gri" onclick="history.back()">Geri Dön</button>
          </div>

          <div class="izledim-durum" id="izledimDurum"></div>

          <div class="uyari">
            Not: Şu an sistem mevcut içerik yapını bozmadan fragman oynatır. Gerçek film linki eklersen “Filmi Aç” butonu da çalışır.
          </div>
        </div>
      `;
    }

    function puanKutusuOlustur(){
      return `
        <div class="puan-kutu">
          <h3>Puan Ver</h3>

          <div class="puan-ozet">
            <div class="puan-buyuk" id="ortalamaPuan">0.0</div>
            <div class="puan-detay" id="puanDetay">Henüz oy yok</div>
          </div>

          <div class="yildizlar">
            <button class="yildiz-btn" data-puan="1">★</button>
            <button class="yildiz-btn" data-puan="2">★</button>
            <button class="yildiz-btn" data-puan="3">★</button>
            <button class="yildiz-btn" data-puan="4">★</button>
            <button class="yildiz-btn" data-puan="5">★</button>
          </div>

          <div class="puan-bilgi" id="puanBilgi">
            1 ile 5 arası puan verebilirsin.
          </div>
        </div>
      `;
    }

    function yorumKutusuOlustur(){
      return `
        <div class="yorum-kutu">
          <h3>Yorumlar</h3>

          <div class="yorum-form">
            <input type="text" id="yorumAd" class="yorum-input" placeholder="Adın">
            <textarea id="yorumMetin" class="yorum-textarea" placeholder="Bu film hakkında yorumunu yaz..."></textarea>
            <div class="butonlar">
              <button class="btn btn-kirmizi" id="yorumGonderBtn">Yorumu Gönder</button>
            </div>
          </div>

          <div class="yorum-listesi" id="yorumListesi"></div>
        </div>
      `;
    }

    function yorumlariGosterFirebase(filmId){
      const yorumListesi = document.getElementById("yorumListesi");
      const yorumRef = collection(db, "yorumlar_" + filmId);
      const q = query(yorumRef, orderBy("zaman", "desc"));

      onSnapshot(q, function(snapshot){
        if(snapshot.empty){
          yorumListesi.innerHTML = `
            <div class="yorum-yok">Bu filme henüz yorum yapılmamış. İlk yorumu sen yaz.</div>
          `;
          return;
        }

        let html = "";

        snapshot.forEach(function(veri){
          const yorum = veri.data();
          html += `
            <div class="yorum-item">
              <div class="yorum-ust">
                <div class="yorum-ad">${guvenliMetin(yorum.ad || "Misafir")}</div>
                <div class="yorum-tarih">${guvenliMetin(yorumTarihiFormatla(yorum.zamanText || yorum.zaman))}</div>
              </div>
              <div class="yorum-metin">${guvenliMetin(yorum.metin || "")}</div>
            </div>
          `;
        });

        yorumListesi.innerHTML = html;
      }, function(error){
        yorumListesi.innerHTML = `
          <div class="yorum-yok">Yorumlar yüklenemedi. Firestore kurallarını kontrol et.</div>
        `;
        console.error(error);
      });
    }

    async function puanOzetiniGuncelle(filmId){
      const puanlarRef = collection(db, "puanlar_" + filmId);
      const snap = await getDocs(puanlarRef);

      let toplam = 0;
      let adet = 0;

      snap.forEach(function(veri){
        const puan = Number(veri.data().puan || 0);
        if(puan >= 1 && puan <= 5){
          toplam += puan;
          adet++;
        }
      });

      const ortalamaAlan = document.getElementById("ortalamaPuan");
      const detayAlan = document.getElementById("puanDetay");

      if(!adet){
        ortalamaAlan.innerText = "0.0";
        detayAlan.innerText = "Henüz oy yok";
        return;
      }

      const ortalama = (toplam / adet).toFixed(1);
      ortalamaAlan.innerText = ortalama;
      detayAlan.innerText = adet + " oy kullanıldı";
    }

    function yildizlariBoya(seciliPuan){
      document.querySelectorAll(".yildiz-btn").forEach(function(btn){
        const btnPuan = Number(btn.getAttribute("data-puan"));
        if(btnPuan <= seciliPuan){
          btn.classList.add("aktif");
        }else{
          btn.classList.remove("aktif");
        }
      });
    }

    function puanSisteminiBaslat(film){
      const filmId = film.id;
      const cihazId = cihazAnahtari();
      const puanBilgi = document.getElementById("puanBilgi");
      const puanlarRef = collection(db, "puanlar_" + filmId);

      const puanDocRef = doc(db, "puanlar_" + filmId, cihazId);

      onSnapshot(puanDocRef, function(docSnap){
        if(docSnap.exists()){
          const veri = docSnap.data();
          const benimPuanim = Number(veri.puan || 0);
          if(benimPuanim){
            yildizlariBoya(benimPuanim);
            puanBilgi.innerText = "Senin puanın: " + benimPuanim + " yıldız";
          }else{
            yildizlariBoya(0);
            puanBilgi.innerText = "1 ile 5 arası puan verebilirsin.";
          }
        }else{
          yildizlariBoya(0);
          puanBilgi.innerText = "1 ile 5 arası puan verebilirsin.";
        }
      });

      onSnapshot(puanlarRef, function(){
        puanOzetiniGuncelle(filmId);
      });

      document.querySelectorAll(".yildiz-btn").forEach(function(btn){
        btn.addEventListener("click", async function(){
          const puan = Number(btn.getAttribute("data-puan"));

          try{
            await setDoc(puanDocRef, {
              puan: puan,
              cihazId: cihazId,
              zamanText: tarihYazisiOlustur()
            });

            yildizlariBoya(puan);
            puanBilgi.innerText = "Senin puanın: " + puan + " yıldız";
          }catch(e){
            alert("Puan gönderilemedi.");
            console.error(e);
          }
        });
      });
    }

    function yorumSisteminiBaslat(film){
      const yorumGonderBtn = document.getElementById("yorumGonderBtn");
      const yorumAd = document.getElementById("yorumAd");
      const yorumMetin = document.getElementById("yorumMetin");

      const kayitliAd = localStorage.getItem("kullanici");
      if(kayitliAd){
        yorumAd.value = kayitliAd;
      }

      yorumlariGosterFirebase(film.id);

      yorumGonderBtn.addEventListener("click", async function(){
        const ad = yorumAd.value.trim();
        const metin = yorumMetin.value.trim();

        if(!ad){
          alert("Lütfen adını yaz.");
          return;
        }

        if(!metin){
          alert("Lütfen bir yorum yaz.");
          return;
        }

        yorumGonderBtn.disabled = true;
        yorumGonderBtn.innerText = "Gönderiliyor...";

        try{
          const yorumRef = collection(db, "yorumlar_" + film.id);

          await addDoc(yorumRef, {
            ad: ad,
            metin: metin,
            zaman: new Date(),
            zamanText: tarihYazisiOlustur()
          });

          yorumMetin.value = "";
        }catch(e){
          alert("Yorum gönderilemedi. Firestore rules ayarını kontrol et.");
          console.error(e);
        }finally{
          yorumGonderBtn.disabled = false;
          yorumGonderBtn.innerText = "Yorumu Gönder";
        }
      });
    }

    function izledimSisteminiBaslat(film){
      const izledimBtn = document.getElementById("izledimBtn");
      const izledimDurum = document.getElementById("izledimDurum");
      const anahtar = izledimAnahtari(film.id);

      function guncelle(){
        const izlendiMi = localStorage.getItem(anahtar) === "true";

        if(izlendiMi){
          izledimBtn.innerText = "✅ İzledin";
          izledimBtn.classList.remove("btn-yesil");
          izledimBtn.classList.add("btn-gri");
          izledimDurum.innerText = "Bu filmi izledim olarak işaretledin.";
        }else{
          izledimBtn.innerText = "✅ İzledim";
          izledimBtn.classList.remove("btn-gri");
          izledimBtn.classList.add("btn-yesil");
          izledimDurum.innerText = "";
        }
      }

      izledimBtn.addEventListener("click", function(){
        const izlendiMi = localStorage.getItem(anahtar) === "true";

        if(izlendiMi){
          localStorage.removeItem(anahtar);
        }else{
          localStorage.setItem(anahtar, "true");
        }

        guncelle();
      });

      guncelle();
    }

    async function filmDetayGoster(){
      const filmId = urlParametresiAl("id");

      if(typeof FILMLER === "undefined" || !Array.isArray(FILMLER)){
        icerik.innerHTML = `
          <div class="bos-kutu">
            <h2>Film listesi bulunamadı</h2>
            <p>filmler.js dosyası düzgün yüklenmemiş olabilir.</p>
            <button class="geri-btn" onclick="history.back()">Geri Dön</button>
          </div>
        `;
        return;
      }

      let film = FILMLER.find(item => String(item.id) === String(filmId));

      if(!film && filmId){
        try{
          const panelFilmRef = doc(panelDb, "filmler", filmId);
          const panelFilmSnap = await getDoc(panelFilmRef);

          if(panelFilmSnap.exists()){
            film = panelFilmSnap.data();
          }
        }catch(e){
          console.error("Firebase film çekme hatası:", e);
        }
      }

      if(!film){
        icerik.innerHTML = `
          <div class="bos-kutu">
            <h2>Film bulunamadı</h2>
            <p>Link yanlış olabilir ya da bu film listede olmayabilir.</p>
            <button class="geri-btn" onclick="history.back()">Geri Dön</button>
          </div>
        `;
        return;
      }

      document.title = film.isim + " - Filmizleful";

      const desc = document.querySelector('meta[name="description"]');
      if(desc) desc.setAttribute("content", film.ozet || film.isim + " filmi hakkında bilgi");

      const canonical = document.querySelector('link[rel="canonical"]');
      if(canonical) canonical.setAttribute("href", window.location.href);

      const ogTitle = document.querySelector('meta[property="og:title"]');
      if(ogTitle) ogTitle.setAttribute("content", film.isim + " - Filmizleful");

      const ogDesc = document.querySelector('meta[property="og:description"]');
      if(ogDesc) ogDesc.setAttribute("content", film.ozet || "");

      const ogImg = document.querySelector('meta[property="og:image"]');
      if(ogImg) ogImg.setAttribute("content", film.afis || "");

      icerik.innerHTML = `
        <div class="film-kart">
          <div class="sol">
            <img class="film-afis" src="${film.afis}" alt="${film.isim}">
          </div>

          <div class="sag">
            <h1 class="film-baslik">${film.isim}</h1>

            <div class="etiketler">
              <span class="etiket">${film.tur || "Film"}</span>
              <span class="etiket">${film.yil || "-"}</span>
              <span class="etiket">IMDb ${film.puan || "-"}</span>
              <span class="etiket">${film.meta || "Filmizleful"}</span>
            </div>

            <div class="film-ozet">
              ${film.ozet || "Bu film için özet eklenmemiş."}
            </div>

            <div class="film-hakkinda">
              <h3>Film Hakkında</h3>
              <p>${film.hakkinda1 || ""}</p>
              <p>${film.hakkinda2 || ""}</p>
            </div>

            ${videoKutusuOlustur(film)}
            ${puanKutusuOlustur()}
            ${yorumKutusuOlustur()}
          </div>
        </div>
      `;

      izledimSisteminiBaslat(film);
      puanSisteminiBaslat(film);
      yorumSisteminiBaslat(film);
    }

    filmDetayGoster();
  </script>

</body>
</html>
