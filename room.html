<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oda Chat + Video Link</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0c0c14;
    color:white;
}
.ust{
    background:#111;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}
.ust a{
    color:white;
    text-decoration:none;
    background:#2a2a2a;
    padding:10px 14px;
    border-radius:10px;
}
.sayfa{
    max-width:1100px;
    margin:auto;
    padding:20px;
}
.video-kutu, .chat{
    background:#151515;
    border-radius:18px;
    padding:18px;
    margin-bottom:20px;
}
.video-baslik{
    font-size:24px;
    font-weight:bold;
    margin-bottom:14px;
}
.video-kontrol{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:14px;
}
.video-kontrol input{
    flex:1;
    min-width:260px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
}
.video-kontrol button, .video-link-alani a, .input button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#e50914;
    color:white;
    cursor:pointer;
    font-weight:bold;
    text-decoration:none;
    display:inline-block;
}
.video-kontrol button:hover, .video-link-alani a:hover, .input button:hover{
    background:#ff1e2d;
}
.video-link-alani{
    background:#1d1d1d;
    border-radius:14px;
    padding:18px;
    line-height:1.7;
}
.video-link-yazi{
    word-break:break-all;
    color:#9fdcff;
    margin-bottom:14px;
}
.chat{
    margin-bottom:0;
}
.mesajlar{
    height:350px;
    overflow-y:auto;
    background:#1a1a1a;
    padding:15px;
    border-radius:15px;
}
.mesaj{
    margin-bottom:10px;
    line-height:1.5;
}
.input{
    margin-top:12px;
    display:flex;
    gap:10px;
}
.input input{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#222;
    color:white;
}
.uyari{
    margin-top:10px;
    color:#ff9a9a;
    font-size:14px;
}
</style>
</head>
<body>

<div class="ust">
    <div id="odaAdi">Oda</div>
    <a href="rooms.html">← Geri</a>
</div>

<div class="sayfa">

    <div class="video-kutu">
        <div class="video-baslik">📺 Ortak Video Linki</div>

        <div class="video-kontrol">
            <input id="videoLink" placeholder="YouTube linki yapıştır...">
            <button onclick="videoAyarla()">Videoyu Değiştir</button>
        </div>

        <div class="uyari" id="videoUyari"></div>

        <div class="video-link-alani">
            <div id="videoDurum">Henüz video seçilmedi.</div>
            <div class="video-link-yazi" id="videoLinkYazi"></div>
            <a id="youtubeAcBtn" href="#" target="_blank" style="display:none;">▶ YouTube'da Aç</a>
        </div>
    </div>

    <div class="chat">
        <div class="video-baslik">💬 Oda Sohbeti</div>

        <div class="mesajlar" id="mesajlar"></div>

        <div class="input">
            <input id="mesajInput" placeholder="Mesaj yaz...">
            <button onclick="gonder()">Gönder</button>
        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    orderBy,
    doc,
    setDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
  authDomain: "filmizleful-chat.firebaseapp.com",
  projectId: "filmizleful-chat",
  storageBucket: "filmizleful-chat.firebasestorage.app",
  messagingSenderId: "873061099685",
  appId: "1:873061099685:web:aa697ed2baadd453dc454c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const oda = params.get("oda") || "genel";
let isim = localStorage.getItem("filmizleful_isim") || "Misafir";

document.getElementById("odaAdi").textContent = "📺 Oda: " + oda;

const mesajlarDiv = document.getElementById("mesajlar");
const videoInput = document.getElementById("videoLink");
const videoDurum = document.getElementById("videoDurum");
const videoLinkYazi = document.getElementById("videoLinkYazi");
const youtubeAcBtn = document.getElementById("youtubeAcBtn");
const videoUyari = document.getElementById("videoUyari");

/* CHAT */
const q = query(collection(db, "rooms", oda, "messages"), orderBy("tarih"));

onSnapshot(q, (snapshot) => {
    mesajlarDiv.innerHTML = "";
    snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.className = "mesaj";
        div.innerHTML = "<b>" + data.isim + ":</b> " + data.mesaj;
        mesajlarDiv.appendChild(div);
    });
    mesajlarDiv.scrollTop = mesajlarDiv.scrollHeight;
});

window.gonder = async function() {
    const input = document.getElementById("mesajInput");
    const text = input.value.trim();
    if (!text) return;

    await addDoc(collection(db, "rooms", oda, "messages"), {
        isim: isim,
        mesaj: text,
        tarih: Date.now()
    });

    input.value = "";
};

/* VIDEO */
const roomDocRef = doc(db, "rooms", oda);

async function odaBelgesiKontrolEt() {
    const snap = await getDoc(roomDocRef);
    if (!snap.exists()) {
        await setDoc(roomDocRef, {
            videoLink: ""
        });
    }
}

function videoGuncelle(link) {
    if (link) {
        videoDurum.textContent = "Bu odada seçili video:";
        videoLinkYazi.textContent = link;
        youtubeAcBtn.href = link;
        youtubeAcBtn.style.display = "inline-block";
    } else {
        videoDurum.textContent = "Henüz video seçilmedi.";
        videoLinkYazi.textContent = "";
        youtubeAcBtn.style.display = "none";
    }
}

await odaBelgesiKontrolEt();

onSnapshot(roomDocRef, (snap) => {
    const data = snap.data();
    if (data && typeof data.videoLink !== "undefined") {
        videoGuncelle(data.videoLink);
    } else {
        videoGuncelle("");
    }
});

window.videoAyarla = async function() {
    const link = videoInput.value.trim();

    if (!link || (!link.includes("youtube.com") && !link.includes("youtu.be"))) {
        videoUyari.textContent = "Geçerli bir YouTube linki yapıştır.";
        return;
    }

    videoUyari.textContent = "";

    await setDoc(roomDocRef, { videoLink: link }, { merge: true });
    videoInput.value = "";
};
</script>

</body>
</html>
