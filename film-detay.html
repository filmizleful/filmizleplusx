<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Detayı</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top, #202033, #0c0c14 70%);
    color:white;
    min-height:100vh;
}

.sayfa{
    max-width:1400px;
    margin:0 auto;
    padding:70px 70px 60px;
}

.ust{
    display:flex;
    align-items:flex-start;
    gap:55px;
    margin-bottom:70px;
    flex-wrap:wrap;
}

.poster{
    width:230px;
    height:300px;
    border-radius:22px;
    overflow:hidden;
    background:rgba(255,255,255,0.03);
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    flex-shrink:0;
}

.poster img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.bilgi{
    max-width:820px;
    padding-top:8px;
}

.bilgi h1{
    margin:0 0 22px 0;
    font-size:64px;
    line-height:1;
    font-weight:800;
}

.meta{
    font-size:20px;
    color:#f2f2f2;
    margin-bottom:22px;
    font-weight:600;
}

.ozet{
    font-size:19px;
    line-height:1.7;
    color:#f4f4f4;
    margin-bottom:28px;
    max-width:760px;
}

.butonlar{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
}

.butonlar a{
    text-decoration:none;
    color:white;
    font-size:18px;
    font-weight:700;
    padding:14px 24px;
    border-radius:14px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:170px;
    transition:0.25s;
}

.fragman{
    background:linear-gradient(90deg,#ff9c52,#ff6d3a);
}

.izle{
    background:linear-gradient(90deg,#55f3ff,#2ed8d8);
}

.geri{
    background:#41445a;
}

.butonlar a:hover{
    transform:translateY(-2px) scale(1.02);
}

.alt{
    max-width:980px;
    margin:0 auto;
}

.hakkinda{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:22px;
    padding:28px 30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.hakkinda h2{
    margin:0 0 18px 0;
    font-size:34px;
    color:#ffe08a;
    font-weight:800;
}

.hakkinda p{
    margin:0 0 16px 0;
    font-size:18px;
    line-height:1.8;
    color:#f2f2f2;
}

.hata{
    text-align:center;
    padding:100px 20px;
    font-size:24px;
}

@media (max-width:900px){
    .sayfa{
        padding:35px 20px 40px;
    }

    .ust{
        flex-direction:column;
        gap:28px;
        margin-bottom:40px;
    }

    .poster{
        width:200px;
        height:260px;
    }

    .bilgi h1{
        font-size:44px;
    }

    .meta{
        font-size:17px;
    }

    .ozet{
        font-size:17px;
    }

    .butonlar a{
        width:100%;
        min-width:0;
    }

    .hakkinda h2{
        font-size:28px;
    }

    .hakkinda p{
        font-size:16px;
    }
}
</style>
</head>
<body>

<div class="sayfa" id="detayAlani"></div>

<script src="filmler.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const filmId = params.get("id");
const film = filmBul(filmId);
const detayAlani = document.getElementById("detayAlani");

if(!film){
    detayAlani.innerHTML = `
        <div class="hata">
            Film bulunamadı.<br><br>
            <a href="index.html" style="color:#fff; text-decoration:none; background:#444; padding:12px 20px; border-radius:12px;">Ana Sayfaya Dön</a>
        </div>
    `;
}else{
    document.title = film.isim;

    let geriSayfasi = "index.html";

    if(film.tur === "aksiyon") geriSayfasi = "aksiyon.html";
    if(film.tur === "korku") geriSayfasi = "korku.html";
    if(film.tur === "bilimkurgu") geriSayfasi = "bilimkurgu.html";
    if(film.tur === "macera") geriSayfasi = "macera.html";

    detayAlani.innerHTML = `
        <div class="ust">
            <div class="poster">
                <img src="${film.afis}" alt="${film.isim} afiş">
            </div>

            <div class="bilgi">
                <h1>${film.isim}</h1>
                <div class="meta">${film.meta}</div>
                <div class="ozet">${film.ozet}</div>

                <div class="butonlar">
                    <a href="${film.fragman}" target="_blank" class="fragman">▶ Fragman izle</a>
                    <a href="${film.izle}" target="_blank" class="izle">📺 Nerede izlenir</a>
                    <a href="${geriSayfasi}" class="geri">← Geri dön</a>
                </div>
            </div>
        </div>

        <div class="alt">
            <div class="hakkinda">
                <h2>🎬 Film Hakkında</h2>
                <p>${film.hakkinda1}</p>
                <p>${film.hakkinda2}</p>
            </div>
        </div>
    `;
}
</script>

</body>
</html>
