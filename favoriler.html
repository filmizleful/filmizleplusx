<!DOCTYPE html>
<html lang="tr">
<head>

  window.dataLayer = window.dataLayer || [];

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favoriler - Filmizleful</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top, #1d1a33 0%, #0b0b14 55%, #000 100%);
    color:white;
}

.ustbar{
    background:rgba(10,10,16,0.95);
    padding:18px 28px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.logo{
    font-size:28px;
    color:#ff6d7a;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
}

.menu a{
    color:white;
    text-decoration:none;
    padding:8px 14px;
    border-radius:10px;
    transition:0.3s;
    font-weight:bold;
}

.menu a:hover{
    background:#1f1f2d;
}

.baslik{
    text-align:center;
    font-size:34px;
    margin:30px 0 10px;
}

.aciklama{
    text-align:center;
    color:#cfd0df;
    margin-bottom:30px;
    padding:0 20px;
}

.favoriler-alani{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:22px;
    max-width:1300px;
    margin:0 auto;
    padding:0 20px 50px;
}

.film{
    width:220px;
    background:rgba(255,255,255,0.05);
    border-radius:22px;
    text-align:center;
    padding:16px 16px 24px;
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.18);
}

.film img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:14px;
    margin-bottom:12px;
    display:block;
}

.film h3{
    margin:0 0 8px;
    font-size:22px;
}

.film-bilgi{
    color:#e1e1ea;
    font-size:15px;
    margin-bottom:14px;
}

.film a{
    display:inline-block;
    text-decoration:none;
    background:#ff7e9d;
    color:white;
    padding:10px 22px;
    border-radius:12px;
    font-weight:bold;
    transition:0.3s;
    margin-bottom:10px;
}

.film a:hover{
    background:#ff6589;
}

.sil-buton{
    display:block;
    width:100%;
    border:none;
    border-radius:12px;
    padding:11px 12px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.sil-buton:hover{
    background:#ff4f6d;
}

.bos{
    text-align:center;
    color:#aaa;
    font-size:20px;
    padding:30px 20px 60px;
}

.alt{
    text-align:center;
    color:#9ea0b8;
    padding:24px;
    border-top:1px solid rgba(255,255,255,0.06);
    margin-top:20px;
}
</style>
</head>
<body>

<div class="ustbar">
    <div class="logo">🎬 Filmizleful</div>

    <div class="menu">
        <a href="index.html">Ana Sayfa</a>
        <a href="favoriler.html">❤️ Favoriler</a>
    </div>
</div>

<div class="baslik">❤️ Favori Filmlerim</div>
<div class="aciklama">Beğendiğin filmler burada görünür.</div>

<div class="favoriler-alani" id="favorilerAlani"></div>
<div class="bos" id="bosYazi" style="display:none;">Henüz favori film eklemedin.</div>

<div class="alt">
    © 2026 Filmizleful
</div>

<script>
function favorileriGoster(){
    let favoriler = JSON.parse(localStorage.getItem("favoriler")) || [];
    let alan = document.getElementById("favorilerAlani");
    let bosYazi = document.getElementById("bosYazi");

    alan.innerHTML = "";

    if(favoriler.length === 0){
        bosYazi.style.display = "block";
        return;
    }else{
        bosYazi.style.display = "none";
    }

    favoriler.forEach(film => {
        alan.innerHTML += `
            <div class="film">
                <img src="${film.resim}" alt="${film.ad}">
                <h3>${film.ad}</h3>
                <div class="film-bilgi">${film.bilgi}</div>
                <a href="film-detay.html?id=${film.id}">İzle</a>
                <button class="sil-buton" onclick="favoriSil('${film.id}')">🗑 Favoriden Sil</button>
            </div>
        `;
    });
}

function favoriSil(id){
    let favoriler = JSON.parse(localStorage.getItem("favoriler")) || [];
    favoriler = favoriler.filter(film => film.id !== id);
    localStorage.setItem("favoriler", JSON.stringify(favoriler));
    favorileriGoster();
}

favorileriGoster();
</script>

</body>
</html>
