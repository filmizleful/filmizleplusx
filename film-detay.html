<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Film Detayı - Filmizleful</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#0b1020,#111827);
      color:white;
      min-height:100vh;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .ust-bar{
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 20px;
      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(10px);
      position:sticky;
      top:0;
      z-index:1000;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#e50914;
      letter-spacing:0.5px;
    }

    .geri-btn{
      background:#e50914;
      color:white;
      border:none;
      border-radius:10px;
      padding:10px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:bold;
    }

    .geri-btn:hover{
      opacity:0.9;
    }

    .sayfa{
      max-width:1200px;
      margin:30px auto;
      padding:0 16px 40px;
    }

    .film-kart{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:28px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 15px 40px rgba(0,0,0,0.35);
    }

    .sol{
      padding:20px;
      background:rgba(255,255,255,0.02);
    }

    .film-afis{
      width:100%;
      border-radius:18px;
      display:block;
      object-fit:cover;
      background:#1f2937;
      min-height:430px;
    }

    .sag{
      padding:24px;
    }

    .film-baslik{
      font-size:34px;
      margin-bottom:14px;
      line-height:1.2;
    }

    .etiketler{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:18px;
    }

    .etiket{
      background:#1f2937;
      color:#e5e7eb;
      padding:8px 14px;
      border-radius:999px;
      font-size:14px;
      border:1px solid rgba(255,255,255,0.07);
    }

    .film-ozet{
      font-size:17px;
      line-height:1.7;
      color:#d1d5db;
      margin-bottom:18px;
    }

    .film-hakkinda{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:16px;
      padding:16px;
      margin-bottom:20px;
    }

    .film-hakkinda h3{
      margin-bottom:10px;
      font-size:20px;
      color:#fff;
    }

    .film-hakkinda p{
      color:#d1d5db;
      line-height:1.7;
      margin-bottom:8px;
    }

    .oynatma-kutu,
    .yorum-kutu{
      background:#0b1220;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:16px;
      margin-top:18px;
    }

    .oynatma-kutu h3,
    .yorum-kutu h3{
      margin-bottom:14px;
      font-size:22px;
    }

    .video-alan{
      position:relative;
      width:100%;
      padding-top:56.25%;
      background:#000;
      border-radius:16px;
      overflow:hidden;
    }

    .video-alan iframe,
    .video-alan video{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      border:none;
    }

    .video-yok{
      background:#1f2937;
      color:#d1d5db;
      border-radius:14px;
      padding:18px;
      text-align:center;
      line-height:1.6;
    }

    .butonlar{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:18px;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-kirmizi{
      background:#e50914;
      color:white;
    }

    .btn-gri{
      background:#374151;
      color:white;
    }

    .btn-yesil{
      background:#16a34a;
      color:white;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:0.95;
    }

    .uyari{
      margin-top:14px;
      color:#9ca3af;
      font-size:14px;
      line-height:1.6;
    }

    .bos-kutu{
      max-width:700px;
      margin:70px auto;
      text-align:center;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      padding:30px 20px;
      border-radius:20px;
    }

    .bos-kutu h2{
      margin-bottom:12px;
      font-size:28px;
    }

    .bos-kutu p{
      color:#d1d5db;
      line-height:1.7;
      margin-bottom:18px;
    }

    .izledim-durum{
      margin-top:14px;
      font-size:15px;
      color:#86efac;
      font-weight:bold;
    }

    .yorum-form{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .yorum-input,
    .yorum-textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:12px;
      padding:14px;
      background:#1f2937;
      color:white;
      font-size:15px;
    }

    .yorum-textarea{
      min-height:110px;
      resize:vertical;
    }

    .yorum-listesi{
      margin-top:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .yorum-item{
      background:#1f2937;
      border-radius:14px;
      padding:14px;
      border:1px solid rgba(255,255,255,0.06);
    }

    .yorum-ust{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .yorum-ad{
      font-weight:bold;
      color:#fff;
    }

    .yorum-tarih{
      font-size:13px;
      color:#9ca3af;
    }

    .yorum-metin{
      color:#d1d5db;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .yorum-yok{
      background:#1f2937;
      color:#cbd5e1;
      border-radius:14px;
      padding:16px;
      text-align:center;
    }

    @media (max-width: 900px){
      .film-kart{
        grid-template-columns:1fr;
      }

      .film-baslik{
        font-size:28px;
      }

      .film-afis{
        max-width:360px;
        margin:auto;
      }
    }
  </style>
</head>
<body>

  <div class="ust-bar">
    <div class="logo">Filmizleful</div>
    <button class="geri-btn" onclick="history.back()">← Geri Dön</button>
  </div>

  <div class="sayfa" id="icerik">
    <div class="bos-kutu">
      <h2>Film yükleniyor...</h2>
      <p>Lütfen bekleyin.</p>
    </div>
  </div>

  <script src="filmler.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
      authDomain: "filmizleful-chat.firebaseapp.com",
      projectId: "filmizleful-chat",
      storageBucket: "filmizleful-chat.firebasestorage.app",
      messagingSenderId: "873061099685",
      appId: "1:873061099685:web:aa697ed2baadd453dc454c",
      measurementId: "G-BQ9P47BS8S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const icerik = document.getElementById("icerik");

    function urlParametresiAl(parametreAdi){
      const params = new URLSearchParams(window.location.search);
      return params.get(parametreAdi);
    }

    function youtubeEmbedYap(url){
      if(!url) return "";

      try{
        if(url.includes("youtube.com/watch?v=")){
          const urlObj = new URL(url);
          const videoId = urlObj.searchParams.get("v");
          if(videoId){
            return "https://www.youtube.com/embed/" + videoId;
          }
        }

        if(url.includes("youtu.be/")){
          const parca = url.split("youtu.be/")[1];
          if(parca){
            const videoId = parca.split("?")[0];
            return "https://www.youtube.com/embed/" + videoId;
          }
        }

        if(url.includes("youtube.com/embed/")){
          return url;
        }

        return url;
      }catch(e){
        return url;
      }
    }

    function izledimAnahtari(filmId){
      return "izledim_" + filmId;
    }

    function tarihYazisiOlustur(){
      const tarih = new Date();
      const gun = String(tarih.getDate()).padStart(2, "0");
      const ay = String(tarih.getMonth() + 1).padStart(2, "0");
      const yil = tarih.getFullYear();
      const saat = String(tarih.getHours()).padStart(2, "0");
      const dakika = String(tarih.getMinutes()).padStart(2, "0");
      return gun + "." + ay + "." + yil + " " + saat + ":" + dakika;
    }

    function guvenliMetin(metin){
      return String(metin)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function videoKutusuOlustur(film){
      const fragmanLinki = film.fragman || "";
      const izleLinki = film.izle || "";

      let videoHTML = "";

      if(fragmanLinki){
        const link = youtubeEmbedYap(fragmanLinki);

        if(
          link.includes("youtube.com/embed/") ||
          link.includes("youtube.com/watch?v=") ||
          link.includes("youtu.be/")
        ){
          videoHTML = `
            <div class="video-alan">
              <iframe
                src="${youtubeEmbedYap(fragmanLinki)}"
                title="${film.isim} Fragman"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
              </iframe>
            </div>
          `;
        }else if(
          link.endsWith(".mp4") ||
          link.endsWith(".webm") ||
          link.endsWith(".ogg")
        ){
          videoHTML = `
            <div class="video-alan">
              <video controls controlsList="nodownload">
                <source src="${link}">
                Tarayıcınız video etiketini desteklemiyor.
              </video>
            </div>
          `;
        }else{
          videoHTML = `
            <div class="video-yok">
              Fragman bağlantısı var ama uygun formatta değil.
            </div>
          `;
        }
      }else{
        videoHTML = `
          <div class="video-yok">
            Bu film için henüz fragman eklenmemiş.
          </div>
        `;
      }

      let izleButonu = "";
      if(izleLinki && izleLinki !== "#"){
        izleButonu = `<a class="btn btn-kirmizi" href="${izleLinki}" target="_blank">Filmi Aç</a>`;
      }

      return `
        <div class="oynatma-kutu">
          <h3>Fragman / Video</h3>
          ${videoHTML}
          <div class="butonlar">
            ${izleButonu}
            <button class="btn btn-yesil" id="izledimBtn">✅ İzledim</button>
            <button class="btn btn-gri" onclick="history.back()">Geri Dön</button>
          </div>
          <div class="izledim-durum" id="izledimDurum"></div>
          <div class="uyari">
            Not: Şu an sistem mevcut içerik yapını bozmadan fragman oynatır. Gerçek film linki eklersen “Filmi Aç” butonu da çalışır.
          </div>
        </div>
      `;
    }

    function yorumKutusuOlustur(){
      return `
        <div class="yorum-kutu">
          <h3>Yorumlar</h3>

          <div class="yorum-form">
            <input type="text" id="yorumAd" class="yorum-input" placeholder="Adın">
            <textarea id="yorumMetin" class="yorum-textarea" placeholder="Bu film hakkında yorumunu yaz..."></textarea>
            <div class="butonlar">
              <button class="btn btn-kirmizi" id="yorumGonderBtn">Yorumu Gönder</button>
            </div>
          </div>

          <div class="yorum-listesi" id="yorumListesi"></div>
        </div>
      `;
    }

    function yorumTarihiFormatla(deger){
      if(!deger) return "";
      if(typeof deger === "string") return deger;

      try{
        if(typeof deger.toDate === "function"){
          const t = deger.toDate();
          const gun = String(t.getDate()).padStart(2, "0");
          const ay = String(t.getMonth() + 1).padStart(2, "0");
          const yil = t.getFullYear();
          const saat = String(t.getHours()).padStart(2, "0");
          const dakika = String(t.getMinutes()).padStart(2, "0");
          return gun + "." + ay + "." + yil + " " + saat + ":" + dakika;
        }
      }catch(e){
        return "";
      }

      return "";
    }

    function yorumlariGosterFirebase(filmId){
      const yorumListesi = document.getElementById("yorumListesi");
      const yorumRef = collection(db, "yorumlar_" + filmId);
      const q = query(yorumRef, orderBy("zaman", "desc"));

      onSnapshot(q, function(snapshot){
        if(snapshot.empty){
          yorumListesi.innerHTML = `
            <div class="yorum-yok">Bu filme henüz yorum yapılmamış. İlk yorumu sen yaz.</div>
          `;
          return;
        }

        let html = "";

        snapshot.forEach(function(doc){
          const yorum = doc.data();
          html += `
            <div class="yorum-item">
              <div class="yorum-ust">
                <div class="yorum-ad">${guvenliMetin(yorum.ad || "Misafir")}</div>
                <div class="yorum-tarih">${guvenliMetin(yorumTarihiFormatla(yorum.zamanText || yorum.zaman))}</div>
              </div>
              <div class="yorum-metin">${guvenliMetin(yorum.metin || "")}</div>
            </div>
          `;
        });

        yorumListesi.innerHTML = html;
      }, function(error){
        yorumListesi.innerHTML = `
          <div class="yorum-yok">Yorumlar yüklenemedi. Firestore kurallarını kontrol et.</div>
        `;
        console.error(error);
      });
    }

    function yorumSisteminiBaslat(film){
      const yorumGonderBtn = document.getElementById("yorumGonderBtn");
      const yorumAd = document.getElementById("yorumAd");
      const yorumMetin = document.getElementById("yorumMetin");

      const kayitliAd = localStorage.getItem("kullanici");
      if(kayitliAd){
        yorumAd.value = kayitliAd;
      }

      yorumlariGosterFirebase(film.id);

      yorumGonderBtn.addEventListener("click", async function(){
        const ad = yorumAd.value.trim();
        const metin = yorumMetin.value.trim();

        if(!ad){
          alert("Lütfen adını yaz.");
          return;
        }

        if(!metin){
          alert("Lütfen bir yorum yaz.");
          return;
        }

        yorumGonderBtn.disabled = true;
        yorumGonderBtn.innerText = "Gönderiliyor...";

        try{
          const yorumRef = collection(db, "yorumlar_" + film.id);

          await addDoc(yorumRef, {
            ad: ad,
            metin: metin,
            zaman: new Date(),
            zamanText: tarihYazisiOlustur()
          });

          yorumMetin.value = "";
        }catch(e){
          alert("Yorum gönderilemedi. Firestore rules ayarını kontrol et.");
          console.error(e);
        }finally{
          yorumGonderBtn.disabled = false;
          yorumGonderBtn.innerText = "Yorumu Gönder";
        }
      });
    }

    function izledimSisteminiBaslat(film){
      const izledimBtn = document.getElementById("izledimBtn");
      const izledimDurum = document.getElementById("izledimDurum");
      const anahtar = izledimAnahtari(film.id);

      function guncelle(){
        const izlendiMi = localStorage.getItem(anahtar) === "true";

        if(izlendiMi){
          izledimBtn.innerText = "✅ İzledin";
          izledimBtn.classList.remove("btn-yesil");
          izledimBtn.classList.add("btn-gri");
          izledimDurum.innerText = "Bu filmi izledim olarak işaretledin.";
        }else{
          izledimBtn.innerText = "✅ İzledim";
          izledimBtn.classList.remove("btn-gri");
          izledimBtn.classList.add("btn-yesil");
          izledimDurum.innerText = "";
        }
      }

      izledimBtn.addEventListener("click", function(){
        const izlendiMi = localStorage.getItem(anahtar) === "true";

        if(izlendiMi){
          localStorage.removeItem(anahtar);
        }else{
          localStorage.setItem(anahtar, "true");
        }

        guncelle();
      });

      guncelle();
    }

    function filmDetayGoster(){
      const filmId = urlParametresiAl("id");

      if(typeof FILMLER === "undefined" || !Array.isArray(FILMLER)){
        icerik.innerHTML = `
          <div class="bos-kutu">
            <h2>Film listesi bulunamadı</h2>
            <p>filmler.js dosyası düzgün yüklenmemiş olabilir.</p>
            <button class="geri-btn" onclick="history.back()">Geri Dön</button>
          </div>
        `;
        return;
      }

      const film = FILMLER.find(item => String(item.id) === String(filmId));

      if(!film){
        icerik.innerHTML = `
          <div class="bos-kutu">
            <h2>Film bulunamadı</h2>
            <p>Link yanlış olabilir ya da bu film listede olmayabilir.</p>
            <button class="geri-btn" onclick="history.back()">Geri Dön</button>
          </div>
        `;
        return;
      }

      document.title = film.isim + " - Filmizleful";

      icerik.innerHTML = `
        <div class="film-kart">
          <div class="sol">
            <img class="film-afis" src="${film.afis}" alt="${film.isim}">
          </div>

          <div class="sag">
            <h1 class="film-baslik">${film.isim}</h1>

            <div class="etiketler">
              <span class="etiket">${film.tur || "Film"}</span>
              <span class="etiket">${film.yil || "-"}</span>
              <span class="etiket">IMDb ${film.puan || "-"}</span>
              <span class="etiket">${film.meta || "Filmizleful"}</span>
            </div>

            <div class="film-ozet">
              ${film.ozet || "Bu film için özet eklenmemiş."}
            </div>

            <div class="film-hakkinda">
              <h3>Film Hakkında</h3>
              <p>${film.hakkinda1 || ""}</p>
              <p>${film.hakkinda2 || ""}</p>
            </div>

            ${videoKutusuOlustur(film)}
            ${yorumKutusuOlustur()}
          </div>
        </div>
      `;

      izledimSisteminiBaslat(film);
      yorumSisteminiBaslat(film);
    }

    filmDetayGoster();
  </script>

</body>
</html>
