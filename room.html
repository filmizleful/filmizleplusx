<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filmizleful Oda</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0c0c14;
    color:white;
}
.ust{
    background:#111;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}
.ust-sol{
    display:flex;
    flex-direction:column;
    gap:5px;
}
.oda-yazi{
    font-weight:bold;
    font-size:20px;
}
.kullanici-yazi{
    color:#ccc;
    font-size:14px;
}
.rol-yazi{
    color:#ffd54a;
    font-size:14px;
    font-weight:bold;
}
.geri-btn{
    color:white;
    text-decoration:none;
    background:#2a2a2a;
    padding:10px 14px;
    border-radius:10px;
}
.container{
    display:flex;
    gap:20px;
    padding:20px;
    box-sizing:border-box;
}
.video-alan{
    flex:2;
}
.video{
    width:100%;
    aspect-ratio:16/9;
    border-radius:15px;
    overflow:hidden;
    background:black;
}
#player{
    width:100%;
    height:100%;
}
.kontrol{
    margin-top:10px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
.kontrol input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#222;
    color:white;
    min-width:220px;
}
.kontrol button{
    padding:10px 14px;
    background:#e50914;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}
.kontrol button:hover,
.input button:hover{
    background:#ff1e2d;
}
.kontrol button:disabled{
    background:#555;
    cursor:not-allowed;
}
.sag-panel{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:16px;
}
.online-kutu,
.chat{
    background:#151515;
    border-radius:15px;
    padding:12px;
}
.online-baslik,
.chat-baslik{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}
.online-sayi{
    font-size:16px;
    color:#ffd54a;
    margin-bottom:10px;
}
.online-liste{
    background:#1a1a1a;
    border-radius:12px;
    padding:10px;
    min-height:80px;
    max-height:160px;
    overflow-y:auto;
}
.online-kisi{
    margin-bottom:8px;
    color:#ddd;
}
.admin-kisi{
    color:#ffd54a;
    font-weight:bold;
}
.chat{
    display:flex;
    flex-direction:column;
    height:420px;
}
.mesajlar{
    flex:1;
    overflow-y:auto;
    margin-bottom:10px;
    background:#1a1a1a;
    border-radius:12px;
    padding:10px;
}
.mesaj{
    margin-bottom:10px;
    line-height:1.5;
    word-break:break-word;
}
.input{
    display:flex;
    gap:5px;
}
.input input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#222;
    color:white;
}
.input button{
    background:#e50914;
    border:none;
    border-radius:10px;
    padding:10px 14px;
    color:white;
    cursor:pointer;
}
.uyari{
    margin-top:8px;
    color:#ff9a9a;
    font-size:14px;
    text-align:left;
}
.video-durum{
    margin-top:10px;
    color:#9fdcff;
    font-size:14px;
    text-align:left;
}
@media(max-width:900px){
    .container{
        flex-direction:column;
    }
    .chat{
        height:360px;
    }
}
</style>
</head>
<body>

<div class="ust">
    <div class="ust-sol">
        <div class="oda-yazi" id="odaAdi">📺 Oda</div>
        <div class="kullanici-yazi" id="kullaniciAdi">Kullanıcı</div>
        <div class="rol-yazi" id="rolYazi">Rol</div>
    </div>

    <a href="rooms.html" class="geri-btn">← Geri</a>
</div>

<div class="container">

    <div class="video-alan">
        <div class="video">
            <div id="player"></div>
        </div>

        <div class="kontrol">
            <input id="link" placeholder="YouTube link">
            <button id="degistirBtn" onclick="videoDegistir()">Video Değiştir</button>
            <button id="playBtn" onclick="playVideo()">▶ Play</button>
            <button id="pauseBtn" onclick="pauseVideo()">⏸ Pause</button>
        </div>

        <div class="uyari" id="uyari"></div>
        <div class="video-durum" id="videoDurum">Henüz video seçilmedi.</div>
    </div>

    <div class="sag-panel">
        <div class="online-kutu">
            <div class="online-baslik">🟢 Online Kişiler</div>
            <div class="online-sayi" id="onlineSayi">0 kişi online</div>
            <div class="online-liste" id="onlineListe"></div>
        </div>

        <div class="chat">
            <div class="chat-baslik">💬 Oda Sohbeti</div>
            <div class="mesajlar" id="mesajlar"></div>

            <div class="input">
                <input id="mesajInput" placeholder="Mesaj...">
                <button onclick="gonder()">Gönder</button>
            </div>
        </div>
    </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    onSnapshot,
    collection,
    addDoc,
    query,
    orderBy,
    deleteDoc,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNoenb7tM6mFK8DEruxFtYLo_FwUXY7uc",
  authDomain: "filmizleful-chat.firebaseapp.com",
  projectId: "filmizleful-chat",
  storageBucket: "filmizleful-chat.firebasestorage.app",
  messagingSenderId: "873061099685",
  appId: "1:873061099685:web:aa697ed2baadd453dc454c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const oda = new URL(window.location.href).searchParams.get("oda") || "genel";
const isim = localStorage.getItem("filmizleful_isim") || "Misafir";
const kullaniciId = "k_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

document.getElementById("odaAdi").innerText = "📺 Oda: " + oda;
document.getElementById("kullaniciAdi").innerText = "👤 Sen: " + isim;

const odaRef = doc(db, "odalar", oda);
const kullaniciRef = doc(db, "rooms", oda, "users", kullaniciId);

let player;
let playerReady = false;
let sonVideo = "";
let sonAksiyon = "";
let adminId = "";
let adminIsim = "";
let adminMi = false;
let bekleyenVideo = "";
let bekleyenAksiyon = "";

window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player("player", {
        height: "100%",
        width: "100%",
        videoId: "",
        playerVars: {
            playsinline: 1,
            rel: 0
        },
        events: {
            onReady: function () {
                playerReady = true;

                if (bekleyenVideo) {
                    try {
                        player.loadVideoById(bekleyenVideo);
                        sonVideo = bekleyenVideo;
                    } catch(e) {}
                }

                if (bekleyenAksiyon === "play") {
                    try { player.playVideo(); } catch(e) {}
                }

                if (bekleyenAksiyon === "pause") {
                    try { player.pauseVideo(); } catch(e) {}
                }
            }
        }
    });
};

function youtubeIdBul(link){
    try{
        if(link.includes("youtu.be/")){
            let id = link.split("youtu.be/")[1];
            if(id.includes("?")) id = id.split("?")[0];
            return id;
        }

        if(link.includes("youtube.com/watch?v=")){
            let url = new URL(link);
            return url.searchParams.get("v") || "";
        }

        if(link.includes("youtube.com/embed/")){
            let id = link.split("embed/")[1];
            if(id.includes("?")) id = id.split("?")[0];
            return id;
        }

        return "";
    }catch{
        return "";
    }
}

function kontrolButonlariniAyarla() {
    document.getElementById("degistirBtn").disabled = !adminMi;
    document.getElementById("playBtn").disabled = !adminMi;
    document.getElementById("pauseBtn").disabled = !adminMi;

    if (adminMi) {
        document.getElementById("rolYazi").textContent = "👑 Sen oda sahibisin";
    } else if (adminIsim) {
        document.getElementById("rolYazi").textContent = "👤 Oda sahibi: " + adminIsim;
    } else {
        document.getElementById("rolYazi").textContent = "👤 Admin belirleniyor...";
    }
}

async function adminiBelirle() {
    const usersQuery = query(collection(db, "rooms", oda, "users"), orderBy("giris"));
    const snap = await getDocs(usersQuery);

    let ilkKisi = null;
    snap.forEach((docSnap) => {
        if (!ilkKisi) {
            ilkKisi = {
                id: docSnap.id,
                ...docSnap.data()
            };
        }
    });

    if (ilkKisi) {
        await setDoc(odaRef, {
            sahipId: ilkKisi.id,
            sahip: ilkKisi.isim
        }, { merge: true });
    }
}

await setDoc(kullaniciRef, {
    isim: isim,
    giris: Date.now()
});

const odaSnap = await getDoc(odaRef);

if (!odaSnap.exists() || !odaSnap.data().sahipId) {
    await setDoc(odaRef, {
        sahipId: kullaniciId,
        sahip: isim
    }, { merge: true });
}

onSnapshot(odaRef, (snap) => {
    if (!snap.exists()) return;

    const d = snap.data();

    adminId = d.sahipId || "";
    adminIsim = d.sahip || "";
    adminMi = adminId === kullaniciId;

    kontrolButonlariniAyarla();

    if (d.videoId) {
        document.getElementById("videoDurum").textContent = "Şu an seçili video ID: " + d.videoId;
        bekleyenVideo = d.videoId;
    }

    if (d.videoId && d.videoId !== sonVideo) {
        if (playerReady && player) {
            try {
                player.loadVideoById(d.videoId);
                sonVideo = d.videoId;
            } catch(e) {}
        }
    }

    const aksiyonAnahtar = (d.action || "") + "_" + (d.actionTime || "");
    if (d.action && aksiyonAnahtar !== sonAksiyon) {
        sonAksiyon = aksiyonAnahtar;
        bekleyenAksiyon = d.action;

        if (playerReady && player) {
            if (d.action === "play") {
                try { player.playVideo(); } catch(e) {}
            }

            if (d.action === "pause") {
                try { player.pauseVideo(); } catch(e) {}
            }
        }
    }
});

window.videoDegistir = async function(){
    if (!adminMi) return;

    let link = document.getElementById("link").value.trim();
    let id = youtubeIdBul(link);

    if (!id) {
        document.getElementById("uyari").textContent = "Geçerli bir YouTube linki yapıştır.";
        return;
    }

    document.getElementById("uyari").textContent = "";

    await setDoc(odaRef, {
        videoId: id,
        action: "load",
        actionTime: Date.now()
    }, { merge:true });

    document.getElementById("link").value = "";
};

window.playVideo = async function(){
    if (!adminMi) return;

    await setDoc(odaRef, {
        action: "play",
        actionTime: Date.now()
    }, { merge:true });
};

window.pauseVideo = async function(){
    if (!adminMi) return;

    await setDoc(odaRef, {
        action: "pause",
        actionTime: Date.now()
    }, { merge:true });
};

/* CHAT */
const chatQuery = query(collection(db, "rooms", oda, "messages"), orderBy("tarih"));

onSnapshot(chatQuery, (snapshot) => {
    let mesajlar = document.getElementById("mesajlar");
    mesajlar.innerHTML = "";

    snapshot.forEach((docSnap) => {
        let data = docSnap.data();
        let div = document.createElement("div");
        div.className = "mesaj";
        div.innerHTML = "<b>" + data.isim + ":</b> " + data.mesaj;
        mesajlar.appendChild(div);
    });

    mesajlar.scrollTop = mesajlar.scrollHeight;
});

window.gonder = async function(){
    let input = document.getElementById("mesajInput");
    let text = input.value.trim();

    if (!text) return;

    await addDoc(collection(db, "rooms", oda, "messages"), {
        isim: isim,
        mesaj: text,
        tarih: Date.now()
    });

    input.value = "";
};

/* ONLINE KİŞİLER */
onSnapshot(collection(db, "rooms", oda, "users"), (snapshot) => {
    const onlineListe = document.getElementById("onlineListe");
    const onlineSayi = document.getElementById("onlineSayi");

    onlineListe.innerHTML = "";

    let sayi = 0;

    snapshot.forEach((docSnap) => {
        sayi++;
        const data = docSnap.data();
        const div = document.createElement("div");
        div.className = "online-kisi" + (docSnap.id === adminId ? " admin-kisi" : "");
        div.textContent = (docSnap.id === adminId ? "👑 " : "👤 ") + data.isim;
        onlineListe.appendChild(div);
    });

    onlineSayi.textContent = sayi + " kişi online";

    if (sayi === 0) {
        onlineListe.innerHTML = "<div class='online-kisi'>Kimse yok</div>";
    }
});

/* ÇIKIŞTA ADMIN DEVİR */
window.addEventListener("beforeunload", async () => {
    try {
        const adminBendeyse = adminId === kullaniciId;

        await deleteDoc(kullaniciRef);

        if (adminBendeyse) {
            setTimeout(async () => {
                await adminiBelirle();
            }, 300);
        }
    } catch (e) {}
});
</script>

</body>
</html>
