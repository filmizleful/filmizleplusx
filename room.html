<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özel Oda - Filmizleful</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b0c1a;
    color:white;
}
.ustbar{
    background:#111;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}
.logo{
    font-size:22px;
    font-weight:bold;
    color:#ffcc70;
}
.geri{
    color:white;
    text-decoration:none;
    background:#222;
    padding:10px 14px;
    border-radius:8px;
}
.container{
    padding:20px;
    max-width:1200px;
    margin:auto;
}
.oda-bilgi{
    margin-bottom:15px;
    color:#ccc;
}
.video-kutu{
    width:100%;
    height:500px;
    background:black;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:20px;
}
#jitsiContainer{
    width:100%;
    height:100%;
}
.chat-kutu{
    height:260px;
    background:#1a1b2e;
    border-radius:10px;
    padding:10px;
    overflow-y:auto;
    margin-bottom:10px;
}
.mesaj-alt{
    display:flex;
    gap:8px;
}
input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#222;
    color:white;
}
button{
    padding:10px 14px;
    border:none;
    border-radius:6px;
    background:#ff6b81;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="ustbar">
    <div class="logo">🎬 Filmizleful Oda</div>
    <a href="rooms.html" class="geri">⬅ Geri</a>
</div>

<div class="container">
    <div class="oda-bilgi" id="odaBilgi">Oda yükleniyor...</div>

    <div class="video-kutu">
        <div id="jitsiContainer"></div>
    </div>

    <div class="chat-kutu" id="chat"></div>

    <div class="mesaj-alt">
        <input type="text" id="mesaj" placeholder="Mesaj yaz...">
        <button onclick="gonder()">Gönder</button>
    </div>
</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const oda = params.get("oda") || "genel";
const isim = localStorage.getItem("filmizleful_isim") || "Misafir";
const avatar = localStorage.getItem("filmizleful_avatar") || "😎";

document.getElementById("odaBilgi").textContent = "📺 Oda: " + oda + " • " + avatar + " " + isim;

// Her oda için ayrı Jitsi oda adı
const roomName = "filmizleful_" + oda.replace(/[^a-zA-Z0-9_-]/g, "_");

const domain = "meet.jit.si";
const options = {
    roomName: roomName,
    parentNode: document.querySelector("#jitsiContainer"),
    userInfo: {
        displayName: avatar + " " + isim
    },
    configOverwrite: {
        prejoinPageEnabled: false,
        startWithAudioMuted: false,
        startWithVideoMuted: false
    },
    interfaceConfigOverwrite: {
        SHOW_JITSI_WATERMARK: false,
        SHOW_BRAND_WATERMARK: false
    }
};

new JitsiMeetExternalAPI(domain, options);

// Basit yerel chat
function gonder(){
    const input = document.getElementById("mesaj");
    const mesaj = input.value.trim();
    if(!mesaj) return;

    const chat = document.getElementById("chat");
    chat.innerHTML += "<div>💬 <b>" + avatar + " " + isim + ":</b> " + mesaj + "</div>";
    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
window.gonder = gonder;
</script>

</body>
</html>
